<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚔️ Diablo: Меч или Огонь | Гео-RPG</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body, html { height: 100%; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; background: #0a0f1a; overflow: hidden; }
        #map { height: 100%; width: 100%; z-index: 1; }
        
        /* Игровая панель */
        .game-panel {
            position: fixed;
            bottom: 16px;
            left: 12px;
            right: 12px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 12px 16px;
            color: #ffefb9;
            z-index: 1000;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            border: 1px solid #d4b87a;
            font-size: 13px;
        }
        .stats {
            display: flex;
            gap: 12px;
            background: #1e2a1c;
            padding: 6px 12px;
            border-radius: 40px;
        }
        .stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 1.1rem;
        }
        .hp-bar, .mana-bar {
            background: #4a1a1a;
            border-radius: 20px;
            height: 6px;
            width: 80px;
            overflow: hidden;
        }
        .mana-bar { background: #1a2a4a; }
        .hp-fill { background: #e34d4d; width: 100%; height: 100%; transition: width 0.2s; }
        .mana-fill { background: #4d7ae3; width: 100%; height: 100%; transition: width 0.2s; }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            background: #1e2a1c;
            padding: 6px 16px;
            border-radius: 60px;
        }
        .action-btn {
            background: #5a3e1b;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.1s;
            min-width: 90px;
        }
        .action-btn.active {
            background: #d4a017;
            color: #1a1a2e;
            box-shadow: 0 0 8px gold;
            transform: scale(0.98);
        }
        .action-btn:active { transform: scale(0.96); }
        .melee-btn { background: #8b5a2b; }
        .fireball-btn { background: #8b3c2c; }
        
        .status { background: #1e2a1c; padding: 4px 12px; border-radius: 40px; font-size: 11px; display: flex; align-items: center; gap: 6px; }
        .led { width: 10px; height: 10px; border-radius: 50%; background-color: #f80; }
        .led.active { background-color: #8bc34a; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }
        @media (max-width: 600px) {
            .game-panel { flex-direction: column; align-items: stretch; bottom: 8px; left: 8px; right: 8px; }
            .stats { justify-content: center; }
            .action-buttons { justify-content: center; }
        }
        .hit-effect {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,0,0,0.3);
            pointer-events: none;
            z-index: 999;
            animation: hitFlash 0.2s ease-out;
        }
        @keyframes hitFlash { 0% { opacity: 1; } 100% { opacity: 0; } }
        
        .mode-indicator {
            position: fixed;
            top: 80px;
            right: 12px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 8px 16px;
            color: #ffefb9;
            z-index: 1000;
            font-size: 14px;
            text-align: center;
            border: 1px solid #d4b87a;
        }
        .mode-icon { font-size: 24px; margin-right: 8px; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="mode-indicator" id="modeIndicator">
    <span id="modeIcon">⚔️</span> Режим: <span id="modeText">Удар</span>
    <div style="font-size: 10px;" id="manaCost">(бесплатно)</div>
</div>

<div class="game-panel" id="gamePanel">
    <div class="stats">
        <div class="stat">🧙‍♀️ <span id="lvl">1</span></div>
        <div class="stat">❤️ <span id="hpCurrent">100</span>/<span id="hpMax">100</span></div>
        <div class="stat">🪄 <span id="manaCurrent">100</span>/<span id="manaMax">100</span></div>
        <div class="stat">🪙 <span id="gold">0</span></div>
    </div>
    <div class="hp-bar"><div class="hp-fill" id="hpFill" style="width:100%"></div></div>
    <div class="mana-bar"><div class="mana-fill" id="manaFill" style="width:100%"></div></div>
    
    <div class="action-buttons">
        <button id="meleeBtn" class="action-btn melee-btn active">⚔️ Удар</button>
        <button id="fireballBtn" class="action-btn fireball-btn">🔥 Огонь (30)</button>
    </div>
    
    <div class="status">
        <span class="led" id="gpsLed"></span>
        <span id="statusText">🌍 Включи GPS</span>
    </div>
    <button id="centerBtn">🎯 Центр</button>
</div>

<script>
    // ============================================================
    //  GEO-DIABLO: Режимы атаки (Удар / Огонь) + клик по цели
    //  - Выбираешь режим (меч или огонь), потом кликаешь по врагу
    //  - Бочки/сундуки открываются любым режимом
    // ============================================================
    
    let map;
    let playerMarker = null;
    let accuracyCircle = null;
    let watchId = null;
    let currentLocation = null;
    
    // Игрок
    let player = {
        lvl: 1,
        hp: 100,
        maxHp: 100,
        mana: 100,
        maxMana: 100,
        xp: 0,
        gold: 0,
        hasFireball: false
    };
    
    let activeMode = 'melee';  // 'melee' или 'fireball'
    
    // Монстры, бочки, сундуки
    let monsters = [];
    let interactives = [];
    let nextId = 1;
    
    // Параметры мира
    const MAX_MONSTERS = 6;
    const SPAWN_RADIUS = 70;
    const MIN_SPAWN_DIST = 30;
    
    // ----------------------------------------------------------
    // КАРТА
    // ----------------------------------------------------------
    function initMap() {
        map = L.map('map').setView([55.751244, 37.618423], 16);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OSM',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);
        
        // Клик по карте — проверяем, не кликнули ли по объекту
        map.on('click', (e) => {
            const clickedLat = e.latlng.lat;
            const clickedLng = e.latlng.lng;
            
            // Ищем монстра поблизости от клика (радиус 15 метров)
            let closestMonster = null;
            let minDist = 20;
            for (let m of monsters) {
                const dist = distance(clickedLat, clickedLng, m.lat, m.lng);
                if (dist < minDist) {
                    minDist = dist;
                    closestMonster = m;
                }
            }
            
            if (closestMonster) {
                // Атакуем монстра выбранным режимом
                if (activeMode === 'melee') {
                    meleeAttack(closestMonster);
                } else {
                    fireballAttack(closestMonster);
                }
                return;
            }
            
            // Ищем бочку/сундук
            for (let obj of interactives) {
                const dist = distance(clickedLat, clickedLng, obj.lat, obj.lng);
                if (dist < 15) {
                    collectInteractive(obj);
                    break;
                }
            }
        });
    }
    
    // ----------------------------------------------------------
    // ИКОНКИ
    // ----------------------------------------------------------
    function getPlayerIcon() {
        return L.divIcon({
            html: `<div style="background:#2c6e2c; width:34px; height:34px; border-radius:50%; border:3px solid #ffd966; display:flex; align-items:center; justify-content:center; font-size:22px;">🧙‍♀️</div>`,
            iconSize: [34, 34]
        });
    }
    
    function getMonsterIcon(type) {
        let emoji = '🧟‍♂️';
        if (type === 'skeleton_melee') emoji = '💀';
        else if (type === 'skeleton_archer') emoji = '🏹';
        return L.divIcon({
            html: `<div style="background:#3a1a1a; width:30px; height:30px; border-radius:50%; border:2px solid #aa4444; display:flex; align-items:center; justify-content:center; font-size:20px;">${emoji}</div>`,
            iconSize: [30, 30]
        });
    }
    
    function getInteractiveIcon(type) {
        let emoji = '📦';
        if (type === 'barrel') emoji = '🪣';
        if (type === 'altar') emoji = '🗿';
        return L.divIcon({
            html: `<div style="background:#2a2a1a; width:28px; height:28px; border-radius:20%; border:1px solid #c9aa4b; display:flex; align-items:center; justify-content:center; font-size:20px;">${emoji}</div>`,
            iconSize: [28, 28]
        });
    }
    
    // ----------------------------------------------------------
    // UI
    // ----------------------------------------------------------
    function updateUI() {
        document.getElementById('lvl').innerText = player.lvl;
        document.getElementById('hpCurrent').innerText = Math.max(0, player.hp);
        document.getElementById('hpMax').innerText = player.maxHp;
        document.getElementById('manaCurrent').innerText = Math.floor(player.mana);
        document.getElementById('manaMax').innerText = player.maxMana;
        document.getElementById('gold').innerText = player.gold;
        document.getElementById('hpFill').style.width = (player.hp / player.maxHp * 100) + '%';
        document.getElementById('manaFill').style.width = (player.mana / player.maxMana * 100) + '%';
        
        if (player.lvl >= 2 && !player.hasFireball) {
            player.hasFireball = true;
            document.getElementById('fireballBtn').disabled = false;
        }
    }
    
    function setActiveMode(mode) {
        activeMode = mode;
        const meleeBtn = document.getElementById('meleeBtn');
        const fireBtn = document.getElementById('fireballBtn');
        const modeText = document.getElementById('modeText');
        const modeIcon = document.getElementById('modeIcon');
        const manaCostSpan = document.getElementById('manaCost');
        
        if (mode === 'melee') {
            meleeBtn.classList.add('active');
            fireBtn.classList.remove('active');
            modeText.innerText = 'Удар';
            modeIcon.innerText = '⚔️';
            manaCostSpan.innerText = '(бесплатно)';
        } else {
            fireBtn.classList.add('active');
            meleeBtn.classList.remove('active');
            modeText.innerText = 'Огонь';
            modeIcon.innerText = '🔥';
            manaCostSpan.innerText = '(30 маны)';
        }
    }
    
    // ----------------------------------------------------------
    // РАССТОЯНИЕ
    // ----------------------------------------------------------
    function distance(lat1, lng1, lat2, lng2) {
        const R = 6371000;
        const φ1 = lat1 * Math.PI/180;
        const φ2 = lat2 * Math.PI/180;
        const Δφ = (lat2-lat1) * Math.PI/180;
        const Δλ = (lng2-lng1) * Math.PI/180;
        const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    
    // ----------------------------------------------------------
    // АТАКИ
    // ----------------------------------------------------------
    function meleeAttack(monster) {
        if (!currentLocation) return;
        const dist = distance(currentLocation.lat, currentLocation.lng, monster.lat, monster.lng);
        if (dist > 15) {
            document.getElementById('statusText').innerHTML = `❌ Слишком далеко (${Math.floor(dist)}м)`;
            return;
        }
        
        monster.hp -= 25;
        document.getElementById('statusText').innerHTML = `⚔️ Удар! ${monster.hp} ❤️ осталось`;
        
        if (monster.hp <= 0) {
            killMonster(monster);
        }
        
        // Эффект удара
        const flash = document.createElement('div');
        flash.className = 'hit-effect';
        document.body.appendChild(flash);
        setTimeout(() => flash.remove(), 200);
    }
    
    function fireballAttack(monster) {
        if (!player.hasFireball) {
            document.getElementById('statusText').innerHTML = '❌ Огонь на 2 уровне';
            return;
        }
        if (player.mana < 30) {
            document.getElementById('statusText').innerHTML = '❌ Нет маны';
            return;
        }
        if (!currentLocation) return;
        
        const dist = distance(currentLocation.lat, currentLocation.lng, monster.lat, monster.lng);
        if (dist > 30) {
            document.getElementById('statusText').innerHTML = `❌ Слишком далеко (${Math.floor(dist)}м)`;
            return;
        }
        
        player.mana -= 30;
        monster.hp -= 45;
        updateUI();
        document.getElementById('statusText').innerHTML = `🔥 Огненный шар! ${monster.hp} ❤️ осталось`;
        
        if (monster.hp <= 0) {
            killMonster(monster);
        }
        
        const flash = document.createElement('div');
        flash.className = 'hit-effect';
        document.body.appendChild(flash);
        setTimeout(() => flash.remove(), 200);
        
        // Реген маны
        setTimeout(() => {
            if (player.mana < player.maxMana) {
                player.mana = Math.min(player.maxMana, player.mana + 5);
                updateUI();
            }
        }, 1000);
    }
    
    function killMonster(monster) {
        const gainXp = 20;
        const gainGold = 8 + Math.floor(Math.random() * 12);
        player.xp += gainXp;
        player.gold += gainGold;
        
        // Проверка уровня
        const xpNeeded = player.lvl * 100;
        if (player.xp >= xpNeeded) {
            player.lvl++;
            player.xp -= xpNeeded;
            player.maxHp += 15;
            player.hp = player.maxHp;
            player.maxMana += 10;
            player.mana = player.maxMana;
            document.getElementById('statusText').innerHTML = `🎉 УРОВЕНЬ ${player.lvl}!`;
        }
        
        updateUI();
        removeMonster(monster.id);
        document.getElementById('statusText').innerHTML = `💀 +${gainXp} XP, +${gainGold} 🪙`;
        
        // Шанс выпадения бочки/сундука
        if (Math.random() < 0.3) {
            addInteractive(monster.lat, monster.lng, Math.random() < 0.7 ? 'barrel' : 'chest');
        }
    }
    
    // ----------------------------------------------------------
    // ИНТЕРАКТИВНЫЕ ОБЪЕКТЫ
    // ----------------------------------------------------------
    function addInteractive(lat, lng, type) {
        const id = nextId++;
        const marker = L.marker([lat, lng], { icon: getInteractiveIcon(type) }).addTo(map);
        let gold = 0, mana = 0;
        if (type === 'chest') { gold = 20 + Math.floor(Math.random() * 40); mana = 10; }
        if (type === 'barrel') { gold = 5 + Math.floor(Math.random() * 10); }
        if (type === 'altar') { gold = 0; mana = 15; }
        interactives.push({ id, lat, lng, type, gold, mana, marker });
    }
    
    function collectInteractive(obj) {
        player.gold += obj.gold;
        player.mana = Math.min(player.maxMana, player.mana + obj.mana);
        if (obj.type === 'altar') player.maxMana += 10;
        updateUI();
        
        if (obj.marker) map.removeLayer(obj.marker);
        const idx = interactives.findIndex(i => i.id === obj.id);
        if (idx !== -1) interactives.splice(idx, 1);
        
        document.getElementById('statusText').innerHTML = `📦 +${obj.gold}🪙 +${obj.mana}🪄`;
        setTimeout(() => {
            if (document.getElementById('statusText').innerHTML.includes('+'))
                document.getElementById('statusText').innerHTML = '⚔️ Ищи врагов';
        }, 1500);
    }
    
    // ----------------------------------------------------------
    // МОНСТРЫ
    // ----------------------------------------------------------
    function addMonster(lat, lng, type) {
        let hp = 32, dmg = 5;
        if (type === 'skeleton_melee') hp = 26;
        if (type === 'skeleton_archer') hp = 22;
        const id = nextId++;
        const marker = L.marker([lat, lng], { icon: getMonsterIcon(type) }).addTo(map);
        monsters.push({ id, lat, lng, type, hp, maxHp: hp, marker });
        return id;
    }
    
    function removeMonster(id) {
        const idx = monsters.findIndex(m => m.id === id);
        if (idx !== -1) {
            if (monsters[idx].marker) map.removeLayer(monsters[idx].marker);
            monsters.splice(idx, 1);
        }
    }
    
    function spawnMonsterNear(lat, lng) {
        if (monsters.length >= MAX_MONSTERS) return;
        const angle = Math.random() * 2 * Math.PI;
        const dist = MIN_SPAWN_DIST + Math.random() * SPAWN_RADIUS;
        const deltaLat = (dist * Math.cos(angle)) / 111320;
        const deltaLng = (dist * Math.sin(angle)) / (111320 * Math.cos(lat * Math.PI/180));
        let newLat = lat + deltaLat, newLng = lng + deltaLng;
        newLat = Math.min(90, Math.max(-90, newLat));
        newLng = Math.min(180, Math.max(-180, newLng));
        const r = Math.random();
        let type = 'zombie';
        if (r < 0.3) type = 'skeleton_melee';
        else if (r < 0.45) type = 'skeleton_archer';
        addMonster(newLat, newLng, type);
    }
    
    // ----------------------------------------------------------
    // GPS
    // ----------------------------------------------------------
    function updatePlayerOnMap(lat, lng, accuracy) {
        if (playerMarker) map.removeLayer(playerMarker);
        if (accuracyCircle) map.removeLayer(accuracyCircle);
        playerMarker = L.marker([lat, lng], { icon: getPlayerIcon() }).addTo(map);
        if (accuracy < 300) {
            accuracyCircle = L.circle([lat, lng], { radius: accuracy, color: '#8bc34a', weight: 1, fillOpacity: 0.1 }).addTo(map);
        }
        document.getElementById('gpsLed').classList.add('active');
        document.getElementById('statusText').innerHTML = '⚔️ Кликай по монстрам!';
    }
    
    function onLocation(position) {
        const { latitude: lat, longitude: lng, accuracy } = position.coords;
        currentLocation = { lat, lng, accuracy };
        updatePlayerOnMap(lat, lng, accuracy);
        
        // Спавн монстров, если мало
        if (monsters.length < 3) {
            for (let i = 0; i < 2; i++) spawnMonsterNear(lat, lng);
        }
        if (interactives.length < 3 && Math.random() < 0.1) {
            addInteractive(lat + (Math.random() - 0.5) * 0.001, lng + (Math.random() - 0.5) * 0.001, 'barrel');
        }
    }
    
    function startGPS() {
        if (!navigator.geolocation) { alert("GPS не поддерживается"); return; }
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                if (watchId) navigator.geolocation.clearWatch(watchId);
                watchId = navigator.geolocation.watchPosition(onLocation, console.error, { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
                onLocation(pos);
            },
            (err) => { alert("Разрешите GPS в настройках"); },
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }
    
    function centerOnMe() {
        if (currentLocation) map.setView([currentLocation.lat, currentLocation.lng], 17);
        else alert("GPS не активен");
    }
    
    // ----------------------------------------------------------
    // ЗАПУСК
    // ----------------------------------------------------------
    window.onload = () => {
        initMap();
        startGPS();
        
        document.getElementById('meleeBtn').onclick = () => setActiveMode('melee');
        document.getElementById('fireballBtn').onclick = () => setActiveMode('fireball');
        document.getElementById('centerBtn').onclick = centerOnMe;
        
        setActiveMode('melee');
        updateUI();
        
        // Стартовые монстры
        setTimeout(() => {
            if (currentLocation) {
                for (let i = 0; i < 3; i++) spawnMonsterNear(currentLocation.lat, currentLocation.lng);
            } else {
                addMonster(55.751244, 37.618423, 'zombie');
                addMonster(55.7515, 37.6188, 'skeleton_melee');
            }
        }, 2000);
        
        // Реген маны и здоровья
        setInterval(() => {
            if (player.mana < player.maxMana) {
                player.mana = Math.min(player.maxMana, player.mana + 2);
                updateUI();
            }
            if (player.hp < player.maxHp && monsters.filter(m => distance(currentLocation?.lat, currentLocation?.lng, m.lat, m.lng) < 25).length === 0) {
                player.hp = Math.min(player.maxHp, player.hp + 1);
                updateUI();
            }
        }, 3000);
    };
</script>
</body>
</html>
