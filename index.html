<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚔️ Diablo 3 | Гео-RPG | Волшебница</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body, html { height: 100%; font-family: 'Segoe UI', 'Cinema', system-ui, sans-serif; background: #0a0f1a; overflow: hidden; }
        #map { height: 100%; width: 100%; z-index: 1; }
        
        /* Diablo 3 Style HUD */
        .diablo-hud {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            border-radius: 80px;
            padding: 12px 20px;
            z-index: 1000;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            border: 1px solid #7a5a3a;
            box-shadow: 0 0 15px rgba(0,0,0,0.6);
            font-family: 'Cinema', monospace;
        }
        
        /* Орбы жизни и маны (Diablo 3 style) */
        .orbs {
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 60px;
            align-items: center;
        }
        .orb {
            position: relative;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #2a0000, #1a0000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 8px rgba(0,0,0,0.5), inset 0 0 8px rgba(255,255,255,0.2);
            border: 1px solid #d4af37;
        }
        .orb-hp {
            background: radial-gradient(circle at 30% 30%, #3a0a0a, #1a0000);
        }
        .orb-mana {
            background: radial-gradient(circle at 30% 30%, #0a1a3a, #000a1a);
        }
        .orb-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #e34d4d;
            border-radius: 50%;
            transition: height 0.2s;
            z-index: 0;
        }
        .orb-fill.mana-fill {
            background: #4d7ae3;
        }
        .orb-content {
            position: relative;
            z-index: 2;
            text-align: center;
            font-weight: bold;
            text-shadow: 0 0 5px black;
            font-size: 14px;
        }
        .orb-icon {
            font-size: 24px;
        }
        .orb-value {
            font-size: 16px;
            font-weight: bold;
            background: rgba(0,0,0,0.6);
            padding: 0 6px;
            border-radius: 20px;
        }
        
        .stats-panel {
            display: flex;
            gap: 15px;
            background: #1e1a10;
            padding: 6px 18px;
            border-radius: 40px;
            border: 1px solid #d4af37;
        }
        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #ffefb9;
        }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            background: #1e1a10;
            padding: 6px 18px;
            border-radius: 60px;
            border: 1px solid #d4af37;
        }
        .action-btn {
            background: #3a2a1a;
            border: none;
            color: #ffefb9;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            transition: 0.1s;
            min-width: 100px;
            font-family: monospace;
            letter-spacing: 1px;
        }
        .action-btn.active {
            background: #d4a017;
            color: #1a1a2e;
            box-shadow: 0 0 12px gold;
            transform: scale(0.97);
        }
        .action-btn:active { transform: scale(0.95); }
        .melee-btn { background: #5a3a1a; border-bottom: 3px solid #b87a2a; }
        .fireball-btn { background: #6a2a1a; border-bottom: 3px solid #e34d4d; }
        
        .status-bar {
            background: #1e1a10;
            padding: 5px 15px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
        }
        .led { width: 12px; height: 12px; border-radius: 50%; background-color: #f80; }
        .led.active { background-color: #8bc34a; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .mode-indicator {
            position: fixed;
            top: 70px;
            right: 12px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            padding: 6px 18px;
            color: #ffefb9;
            z-index: 1000;
            font-size: 13px;
            text-align: center;
            border: 1px solid #d4af37;
            font-weight: bold;
        }
        
        @media (max-width: 700px) {
            .diablo-hud { flex-direction: column; align-items: stretch; border-radius: 40px; bottom: 10px; left: 10px; right: 10px; }
            .orbs { justify-content: center; }
            .action-buttons { justify-content: center; }
            .orb { width: 55px; height: 55px; }
            .orb-icon { font-size: 18px; }
            .orb-value { font-size: 11px; }
        }
        
        .hit-effect {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,0,0,0.3);
            pointer-events: none;
            z-index: 999;
            animation: hitFlash 0.2s ease-out;
        }
        @keyframes hitFlash { 0% { opacity: 1; } 100% { opacity: 0; } }
        
        .gold-icon { font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="mode-indicator" id="modeIndicator">
    ⚔️ <span id="modeText">Удар</span> | <span id="manaCostInfo">бесплатно</span>
</div>

<div class="diablo-hud">
    <!-- Орбы жизни и маны -->
    <div class="orbs">
        <div class="orb orb-hp">
            <div class="orb-fill" id="hpFillOrb" style="height: 100%;"></div>
            <div class="orb-content">
                <div class="orb-icon">❤️</div>
                <div class="orb-value"><span id="hpCurrent">100</span>/<span id="hpMax">100</span></div>
            </div>
        </div>
        <div class="orb orb-mana">
            <div class="orb-fill mana-fill" id="manaFillOrb" style="height: 100%;"></div>
            <div class="orb-content">
                <div class="orb-icon">🪄</div>
                <div class="orb-value"><span id="manaCurrent">100</span>/<span id="manaMax">100</span></div>
            </div>
        </div>
    </div>
    
    <!-- Статы -->
    <div class="stats-panel">
        <div class="stat">🧙‍♀️ <span id="lvl">1</span></div>
        <div class="stat">🪙 <span id="gold">0</span></div>
        <div class="stat">✨ <span id="xp">0</span>/<span id="xpNext">100</span></div>
    </div>
    
    <!-- Кнопки атаки -->
    <div class="action-buttons">
        <button id="meleeBtn" class="action-btn melee-btn active">⚔️ Удар</button>
        <button id="fireballBtn" class="action-btn fireball-btn">🔥 Огонь (30)</button>
    </div>
    
    <div class="status-bar">
        <span class="led" id="gpsLed"></span>
        <span id="statusText">🌍 Включи GPS</span>
    </div>
    <button id="centerBtn" style="background:#3a2a1a; border:none; padding:8px 16px; border-radius:40px;">🎯 Центр</button>
</div>

<script>
    // ============================================================
    //  GEO-DIABLO 3: Волшебница, орбы, огонь с 1 уровня
    //  - Выбор режима (Удар / Огонь), клик по монстру
    //  - Орбы здоровья и маны (круглые, Diablo style)
    //  - Волшебница владеет огнём с самого начала
    // ============================================================
    
    let map;
    let playerMarker = null;
    let accuracyCircle = null;
    let watchId = null;
    let currentLocation = null;
    
    let player = {
        lvl: 1,
        hp: 100,
        maxHp: 100,
        mana: 100,
        maxMana: 100,
        xp: 0,
        gold: 0
    };
    
    let activeMode = 'melee';  // 'melee' или 'fireball'
    
    let monsters = [];
    let interactives = [];
    let nextId = 1;
    
    const MAX_MONSTERS = 6;
    const SPAWN_RADIUS = 70;
    const MIN_SPAWN_DIST = 30;
    
    // ----------------------------------------------------------
    // КАРТА + КЛИК ПО ЦЕЛИ
    // ----------------------------------------------------------
    function initMap() {
        map = L.map('map').setView([55.751244, 37.618423], 16);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OSM',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);
        
        map.on('click', (e) => {
            const clickedLat = e.latlng.lat;
            const clickedLng = e.latlng.lng;
            
            let closestMonster = null;
            let minDist = 20;
            for (let m of monsters) {
                const dist = distance(clickedLat, clickedLng, m.lat, m.lng);
                if (dist < minDist) {
                    minDist = dist;
                    closestMonster = m;
                }
            }
            
            if (closestMonster) {
                if (activeMode === 'melee') meleeAttack(closestMonster);
                else fireballAttack(closestMonster);
                return;
            }
            
            for (let obj of interactives) {
                if (distance(clickedLat, clickedLng, obj.lat, obj.lng) < 15) {
                    collectInteractive(obj);
                    break;
                }
            }
        });
    }
    
    // ----------------------------------------------------------
    // ИКОНКИ
    // ----------------------------------------------------------
    function getPlayerIcon() {
        return L.divIcon({
            html: `<div style="background:#2c6e2c; width:34px; height:34px; border-radius:50%; border:3px solid #ffd966; display:flex; align-items:center; justify-content:center; font-size:22px; box-shadow:0 0 12px gold;">🧙‍♀️</div>`,
            iconSize: [34, 34]
        });
    }
    
    function getMonsterIcon(type) {
        let emoji = '🧟‍♂️';
        if (type === 'skeleton_melee') emoji = '💀';
        else if (type === 'skeleton_archer') emoji = '🏹';
        return L.divIcon({
            html: `<div style="background:#3a1a1a; width:30px; height:30px; border-radius:50%; border:2px solid #aa4444; display:flex; align-items:center; justify-content:center; font-size:20px;">${emoji}</div>`,
            iconSize: [30, 30]
        });
    }
    
    function getInteractiveIcon(type) {
        let emoji = '📦';
        if (type === 'barrel') emoji = '🪣';
        if (type === 'altar') emoji = '🗿';
        return L.divIcon({
            html: `<div style="background:#2a2a1a; width:28px; height:28px; border-radius:20%; border:1px solid #c9aa4b; display:flex; align-items:center; justify-content:center; font-size:20px;">${emoji}</div>`,
            iconSize: [28, 28]
        });
    }
    
    // ----------------------------------------------------------
    // UI
    // ----------------------------------------------------------
    function updateUI() {
        document.getElementById('lvl').innerText = player.lvl;
        document.getElementById('hpCurrent').innerText = Math.max(0, player.hp);
        document.getElementById('hpMax').innerText = player.maxHp;
        document.getElementById('manaCurrent').innerText = Math.floor(player.mana);
        document.getElementById('manaMax').innerText = player.maxMana;
        document.getElementById('gold').innerText = player.gold;
        document.getElementById('xp').innerText = player.xp;
        document.getElementById('xpNext').innerText = player.lvl * 100;
        
        const hpPercent = (player.hp / player.maxHp) * 100;
        const manaPercent = (player.mana / player.maxMana) * 100;
        document.getElementById('hpFillOrb').style.height = hpPercent + '%';
        document.getElementById('manaFillOrb').style.height = manaPercent + '%';
    }
    
    function setActiveMode(mode) {
        activeMode = mode;
        const meleeBtn = document.getElementById('meleeBtn');
        const fireBtn = document.getElementById('fireballBtn');
        const modeTextSpan = document.getElementById('modeText');
        const manaInfo = document.getElementById('manaCostInfo');
        
        if (mode === 'melee') {
            meleeBtn.classList.add('active');
            fireBtn.classList.remove('active');
            modeTextSpan.innerText = 'Удар';
            manaInfo.innerText = 'бесплатно';
        } else {
            fireBtn.classList.add('active');
            meleeBtn.classList.remove('active');
            modeTextSpan.innerText = 'Огонь';
            manaInfo.innerText = '30 маны';
        }
    }
    
    function distance(lat1, lng1, lat2, lng2) {
        const R = 6371000;
        const φ1 = lat1 * Math.PI/180;
        const φ2 = lat2 * Math.PI/180;
        const Δφ = (lat2-lat1) * Math.PI/180;
        const Δλ = (lng2-lng1) * Math.PI/180;
        const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    
    // ----------------------------------------------------------
    // АТАКИ
    // ----------------------------------------------------------
    function meleeAttack(monster) {
        if (!currentLocation) return;
        const dist = distance(currentLocation.lat, currentLocation.lng, monster.lat, monster.lng);
        if (dist > 15) {
            document.getElementById('statusText').innerHTML = `❌ Далеко (${Math.floor(dist)}м)`;
            return;
        }
        monster.hp -= 25;
        document.getElementById('statusText').innerHTML = `⚔️ Удар! ${monster.hp} ❤️`;
        if (monster.hp <= 0) killMonster(monster);
        hitFlash();
    }
    
    function fireballAttack(monster) {
        if (player.mana < 30) {
            document.getElementById('statusText').innerHTML = '❌ Нет маны';
            return;
        }
        if (!currentLocation) return;
        const dist = distance(currentLocation.lat, currentLocation.lng, monster.lat, monster.lng);
        if (dist > 30) {
            document.getElementById('statusText').innerHTML = `❌ Далеко (${Math.floor(dist)}м)`;
            return;
        }
        player.mana -= 30;
        monster.hp -= 45;
        updateUI();
        document.getElementById('statusText').innerHTML = `🔥 Огонь! ${monster.hp} ❤️`;
        if (monster.hp <= 0) killMonster(monster);
        hitFlash();
        
        setTimeout(() => {
            if (player.mana < player.maxMana) {
                player.mana = Math.min(player.maxMana, player.mana + 5);
                updateUI();
            }
        }, 1000);
    }
    
    function killMonster(monster) {
        const gainXp = 20 + Math.floor(Math.random() * 10);
        const gainGold = 8 + Math.floor(Math.random() * 12);
        player.xp += gainXp;
        player.gold += gainGold;
        
        const xpNeeded = player.lvl * 100;
        if (player.xp >= xpNeeded) {
            player.lvl++;
            player.xp -= xpNeeded;
            player.maxHp += 15;
            player.hp = player.maxHp;
            player.maxMana += 10;
            player.mana = player.maxMana;
            document.getElementById('statusText').innerHTML = `🎉 УРОВЕНЬ ${player.lvl}!`;
        }
        updateUI();
        removeMonster(monster.id);
        document.getElementById('statusText').innerHTML = `💀 +${gainXp} XP, +${gainGold} 🪙`;
        
        if (Math.random() < 0.3) {
            addInteractive(monster.lat, monster.lng, Math.random() < 0.7 ? 'barrel' : 'chest');
        }
    }
    
    function hitFlash() {
        const flash = document.createElement('div');
        flash.className = 'hit-effect';
        document.body.appendChild(flash);
        setTimeout(() => flash.remove(), 200);
    }
    
    // ----------------------------------------------------------
    // ИНТЕРАКТИВ
    // ----------------------------------------------------------
    function addInteractive(lat, lng, type) {
        const id = nextId++;
        const marker = L.marker([lat, lng], { icon: getInteractiveIcon(type) }).addTo(map);
        let gold = 0, mana = 0;
        if (type === 'chest') { gold = 20 + Math.floor(Math.random() * 40); mana = 10; }
        if (type === 'barrel') { gold = 5 + Math.floor(Math.random() * 10); }
        if (type === 'altar') { gold = 0; mana = 15; }
        interactives.push({ id, lat, lng, type, gold, mana, marker });
    }
    
    function collectInteractive(obj) {
        player.gold += obj.gold;
        player.mana = Math.min(player.maxMana, player.mana + obj.mana);
        if (obj.type === 'altar') player.maxMana += 10;
        updateUI();
        if (obj.marker) map.removeLayer(obj.marker);
        const idx = interactives.findIndex(i => i.id === obj.id);
        if (idx !== -1) interactives.splice(idx, 1);
        document.getElementById('statusText').innerHTML = `📦 +${obj.gold}🪙 +${obj.mana}🪄`;
    }
    
    // ----------------------------------------------------------
    // МОНСТРЫ
    // ----------------------------------------------------------
    function addMonster(lat, lng, type) {
        let hp = 32;
        if (type === 'skeleton_melee') hp = 26;
        if (type === 'skeleton_archer') hp = 22;
        const id = nextId++;
        const marker = L.marker([lat, lng], { icon: getMonsterIcon(type) }).addTo(map);
        monsters.push({ id, lat, lng, type, hp, marker });
    }
    
    function removeMonster(id) {
        const idx = monsters.findIndex(m => m.id === id);
        if (idx !== -1) {
            if (monsters[idx].marker) map.removeLayer(monsters[idx].marker);
            monsters.splice(idx, 1);
        }
    }
    
    function spawnMonsterNear(lat, lng) {
        if (monsters.length >= MAX_MONSTERS) return;
        const angle = Math.random() * 2 * Math.PI;
        const dist = MIN_SPAWN_DIST + Math.random() * SPAWN_RADIUS;
        const deltaLat = (dist * Math.cos(angle)) / 111320;
        const deltaLng = (dist * Math.sin(angle)) / (111320 * Math.cos(lat * Math.PI/180));
        let newLat = lat + deltaLat, newLng = lng + deltaLng;
        newLat = Math.min(90, Math.max(-90, newLat));
        newLng = Math.min(180, Math.max(-180, newLng));
        const r = Math.random();
        let type = 'zombie';
        if (r < 0.3) type = 'skeleton_melee';
        else if (r < 0.45) type = 'skeleton_archer';
        addMonster(newLat, newLng, type);
    }
    
    // ----------------------------------------------------------
    // GPS
    // ----------------------------------------------------------
    function updatePlayerOnMap(lat, lng, accuracy) {
        if (playerMarker) map.removeLayer(playerMarker);
        if (accuracyCircle) map.removeLayer(accuracyCircle);
        playerMarker = L.marker([lat, lng], { icon: getPlayerIcon() }).addTo(map);
        if (accuracy < 300) {
            accuracyCircle = L.circle([lat, lng], { radius: accuracy, color: '#8bc34a', weight: 1, fillOpacity: 0.1 }).addTo(map);
        }
        document.getElementById('gpsLed').classList.add('active');
        document.getElementById('statusText').innerHTML = '🔮 Кликай по монстрам!';
    }
    
    function onLocation(position) {
        const { latitude: lat, longitude: lng, accuracy } = position.coords;
        currentLocation = { lat, lng, accuracy };
        updatePlayerOnMap(lat, lng, accuracy);
        if (monsters.length < 3) for (let i = 0; i < 2; i++) spawnMonsterNear(lat, lng);
        if (interactives.length < 3 && Math.random() < 0.1) {
            addInteractive(lat + (Math.random() - 0.5) * 0.001, lng + (Math.random() - 0.5) * 0.001, 'barrel');
        }
    }
    
    function startGPS() {
        if (!navigator.geolocation) { alert("GPS не поддерживается"); return; }
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                if (watchId) navigator.geolocation.clearWatch(watchId);
                watchId = navigator.geolocation.watchPosition(onLocation, console.error, { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });
                onLocation(pos);
            },
            () => alert("Разрешите GPS"),
            { enableHighAccuracy: true, timeout: 10000 }
        );
    }
    
    function centerOnMe() {
        if (currentLocation) map.setView([currentLocation.lat, currentLocation.lng], 17);
        else alert("GPS не активен");
    }
    
    // ----------------------------------------------------------
    // ЗАПУСК
    // ----------------------------------------------------------
    window.onload = () => {
        initMap();
        startGPS();
        
        document.getElementById('meleeBtn').onclick = () => setActiveMode('melee');
        document.getElementById('fireballBtn').onclick = () => setActiveMode('fireball');
        document.getElementById('centerBtn').onclick = centerOnMe;
        
        setActiveMode('melee');
        updateUI();
        
        setTimeout(() => {
            if (currentLocation) {
                for (let i = 0; i < 3; i++) spawnMonsterNear(currentLocation.lat, currentLocation.lng);
            } else {
                addMonster(55.751244, 37.618423, 'zombie');
                addMonster(55.7515, 37.6188, 'skeleton_melee');
            }
        }, 2000);
        
        setInterval(() => {
            if (player.mana < player.maxMana) {
                player.mana = Math.min(player.maxMana, player.mana + 2);
                updateUI();
            }
            if (player.hp < player.maxHp && monsters.filter(m => distance(currentLocation?.lat, currentLocation?.lng, m.lat, m.lng) < 25).length === 0) {
                player.hp = Math.min(player.maxHp, player.hp + 1);
                updateUI();
            }
        }, 3000);
    };
</script>
</body>
</html>
