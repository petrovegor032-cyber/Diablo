<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>вЪФпЄП –Э–µ–Ї—А–Њ–Љ–∞–љ—В | –У–Њ—А–Є–Ј–Њ–љ—В–∞–ї—М–љ—Л–є –Љ–∞—Б—И—В–∞–± | –Ъ–Њ–Љ–њ–∞–Ї—В–љ–∞—П –њ–∞–љ–µ–ї—М</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body, html { height: 100%; font-family: system-ui, sans-serif; background: #0a0f1a; overflow: hidden; }
        #map { height: 100%; width: 100%; z-index: 1; }
        #fogCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }
        
        /* –Т–µ—А—Е–љ—П—П –њ–∞–љ–µ–ї—М вАФ –Љ–∞–Ї—Б–Є–Љ–∞–ї—М–љ–Њ –Ї–Њ–Љ–њ–∞–Ї—В–љ–∞—П */
        .top-stats {
            position: fixed;
            top: 8px;
            left: 8px;
            right: 8px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 5px 12px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #d4af37;
            font-size: 0.7rem;
            color: #ffefb9;
            gap: 6px;
            flex-wrap: wrap;
        }
        .stats-left {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 3px;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 30px;
        }
        .event-area {
            background: rgba(0,0,0,0.6);
            padding: 2px 8px;
            border-radius: 30px;
            font-size: 0.6rem;
            color: #ffcc66;
            max-width: 220px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* –У–Ю–†–Ш–Ч–Ю–Э–Ґ–Р–Ы–ђ–Э–Ђ–Х –Ї–љ–Њ–њ–Ї–Є –Љ–∞—Б—И—В–∞–±–∞ */
        .zoom-controls {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.6);
            padding: 2px 8px;
            border-radius: 30px;
        }
        .zoom-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #2a2a1a;
            border: 1px solid #d4af37;
            color: #ffefb9;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .zoom-btn:active { transform: scale(0.95); background: #d4a017; }
        .zoom-value {
            text-align: center;
            font-size: 10px;
            color: #ffcc66;
            font-weight: bold;
            min-width: 28px;
        }
        
        /* –Ъ–љ–Њ–њ–Ї–Є —Б–Њ—Е—А–∞–љ–µ–љ–Є—П/—Б–±—А–Њ—Б–∞ */
        .save-controls {
            display: flex;
            gap: 5px;
            background: rgba(0,0,0,0.6);
            padding: 2px 8px;
            border-radius: 30px;
        }
        .save-btn {
            background: #2a2a1a;
            border: 1px solid #d4af37;
            color: #ffefb9;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            padding: 3px 8px;
            border-radius: 30px;
        }
        .save-btn:active { transform: scale(0.95); background: #d4a017; }
        .reset-btn { background: #5a2a2a; }
        
        /* –Э–Є–ґ–љ–Є–µ –Њ—А–±—Л */
        .bottom-panel {
            position: fixed;
            bottom: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 15px;
            z-index: 2000;
        }
        .orb {
            position: relative;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid #d4af37;
            overflow: hidden;
            background: radial-gradient(circle at 35% 35%, #3a0a0a, #1a0000);
        }
        .orb-mana { background: radial-gradient(circle at 35% 35%, #0a1a3a, #000a1a); }
        .orb::after {
            content: '';
            position: absolute;
            top: 10%;
            left: 15%;
            width: 30%;
            height: 25%;
            background: radial-gradient(circle, rgba(255,255,255,0.4), rgba(255,255,255,0));
            border-radius: 50%;
            pointer-events: none;
            z-index: 3;
        }
        .orb-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(to top, #ff6666, #cc3333);
            transition: height 0.2s ease-out;
        }
        .mana-fill { background: linear-gradient(to top, #6699ff, #3355cc); }
        .info-center {
            flex: 1;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 4px 8px;
            margin-bottom: 5px;
            border: 1px solid #d4af37;
            text-align: center;
            font-weight: bold;
            font-size: 0.8rem;
            color: #ffefb9;
            pointer-events: none;
        }
        
        /* –Я–∞–љ–µ–ї—М –і–µ–є—Б—В–≤–Є–є */
        .action-bar {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            padding: 5px 14px;
            border-radius: 50px;
            z-index: 1000;
            border: 1px solid #d4af37;
        }
        .action-bar-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #2a2a1a;
            border: 2px solid #d4af37;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            position: relative;
        }
        .action-bar-btn:active { transform: scale(0.95); }
        .action-bar-btn.active { background: #d4a017; box-shadow: 0 0 12px gold; }
        .potion-count {
            position: absolute;
            bottom: -4px;
            right: -4px;
            background: #1a1a1a;
            color: #ffcc66;
            font-size: 9px;
            padding: 1px 4px;
            border-radius: 16px;
            border: 1px solid #d4af37;
        }
        .hp-potion { background: #8b0000; }
        .mana-potion { background: #00008b; }
        .melee-btn { background: #5a3a1a; }
        .summon-btn { background: #3a2a5a; }
        
        .hit-effect {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,0,0,0.3);
            pointer-events: none;
            z-index: 999;
            animation: hitFlash 0.2s;
        }
        @keyframes hitFlash { 0% { opacity: 1; } 100% { opacity: 0; } }
        
        .led { width: 6px; height: 6px; border-radius: 50%; background-color: #f80; display: inline-block; }
        .led.active { background-color: #8bc34a; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }
        
        @media (max-width: 700px) {
            .orb { width: 55px; height: 55px; }
            .action-bar-btn { width: 42px; height: 42px; font-size: 20px; }
            .action-bar { bottom: 80px; gap: 8px; padding: 4px 10px; }
            .info-center { font-size: 0.7rem; padding: 3px 6px; }
            .stat-item { padding: 2px 5px; font-size: 0.55rem; }
            .event-area { max-width: 120px; font-size: 0.5rem; padding: 2px 6px; }
            .save-btn { font-size: 8px; padding: 2px 5px; }
            .zoom-btn { width: 22px; height: 22px; font-size: 12px; }
            .zoom-value { font-size: 9px; min-width: 24px; }
        }
    </style>
</head>
<body>

<div id="map"></div>
<canvas id="fogCanvas"></canvas>

<div class="top-stats">
    <div class="stats-left">
        <div class="stat-item">рЯІЩвАНвЩВпЄП <span id="lvl">1</span></div>
        <div class="stat-item">вЬ® <span id="xp">0</span>/<span id="xpNext">100</span></div>
        <div class="stat-item">рЯ™Щ <span id="gold">0</span></div>
        <div class="stat-item">рЯУ¶ <span id="resources">0</span></div>
        <div class="stat-item"><span class="led" id="gpsLed"></span><span id="statusText">рЯМН</span></div>
    </div>
    <div class="event-area" id="eventMessage">рЯФЃ –У–Њ—В–Њ–≤</div>
    <div class="zoom-controls">
        <div class="zoom-btn" id="zoomOut">вИТ</div>
        <div class="zoom-value" id="zoomValue">60</div>
        <div class="zoom-btn" id="zoomIn">+</div>
    </div>
    <div class="save-controls">
        <div class="save-btn" id="saveBtn">рЯТЊ</div>
        <div class="save-btn reset-btn" id="resetBtn">рЯЧСпЄП</div>
    </div>
</div>

<div class="bottom-panel">
    <div class="orb orb-hp">
        <div class="orb-fill" id="hpFillOrb" style="height: 100%;"></div>
    </div>
    <div class="info-center" id="infoCenter">вЪФпЄП –£–і–∞—А</div>
    <div class="orb orb-mana">
        <div class="orb-fill mana-fill" id="manaFillOrb" style="height: 100%;"></div>
    </div>
</div>

<div class="action-bar">
    <div class="action-bar-btn melee-btn" id="meleeBtn">вЪФпЄП</div>
    <div class="action-bar-btn summon-btn" id="summonBtn">рЯІЯ<span class="potion-count" id="summonCost">50</span></div>
    <div class="action-bar-btn hp-potion" id="hpPotionBtn">рЯІ™<span class="potion-count" id="hpPotionCount">3</span></div>
    <div class="action-bar-btn mana-potion" id="manaPotionBtn">рЯТІ<span class="potion-count" id="manaPotionCount">2</span></div>
</div>

<script>
    // ============================================================
    //  –У–Ю–†–Ш–Ч–Ю–Э–Ґ–Р–Ы–ђ–Э–Ђ–Щ –Ь–Р–°–®–Ґ–Р–С | –Ч–£–Ь –Ф–Ю 100 | –°–Ю–•–†–Р–Э–Х–Э–Ш–Х
    //  –Ъ–Ю–Ь–Я–Р–Ъ–Ґ–Э–Р–ѓ –Т–Х–†–•–Э–ѓ–ѓ –Я–Р–Э–Х–Ы–ђ
    // ============================================================
    
    let map;
    let playerMarker = null;
    let accuracyCircle = null;
    let watchId = null;
    let currentLocation = null;
    
    let revealedCircles = [];
    const FOG_RADIUS = 70;
    
    let player = {
        lvl: 1,
        hp: 100,
        maxHp: 100,
        mana: 100,
        maxMana: 100,
        xp: 0,
        gold: 0,
        resources: 0,
        hpPotions: 3,
        manaPotions: 2
    };
    
    let activeMode = 'melee';
    let monsters = [];
    let interactives = [];
    let minion = null;
    let nextId = 1;
    
    const MAX_MONSTERS = 6;
    const SPAWN_RADIUS = 50;
    const MIN_SPAWN_DIST = 20;
    const COLLECT_RADIUS = 8;
    const SUMMON_MANA_COST = 50;
    const MELEE_RANGE = 15;
    const ZOMBIE_SPEED = 0.000005;
    const MINION_SPEED = 0.00005;
    
    let currentZoom = 60;
    
    let audioEnabled = false;
    let hitSound = null, summonSound = null, collectSound = null, potionSound = null;
    
    // ========== –°–Ю–•–†–Р–Э–Х–Э–Ш–Х ==========
    function saveGame() {
        const saveData = {
            lvl: player.lvl,
            xp: player.xp,
            gold: player.gold,
            resources: player.resources,
            hpPotions: player.hpPotions,
            manaPotions: player.manaPotions,
            maxHp: player.maxHp,
            maxMana: player.maxMana,
            version: 1
        };
        localStorage.setItem('necromancer_save', JSON.stringify(saveData));
        showEventMessage('рЯТЊ –°–Њ—Е—А–∞–љ–µ–љ–Њ', false);
    }
    
    function resetGame() {
        if (confirm('–°–±—А–Њ—Б–Є—В—М –≤–µ—Б—М –њ—А–Њ–≥—А–µ—Б—Б?')) {
            localStorage.removeItem('necromancer_save');
            player = {
                lvl: 1,
                hp: 100,
                maxHp: 100,
                mana: 100,
                maxMana: 100,
                xp: 0,
                gold: 0,
                resources: 0,
                hpPotions: 3,
                manaPotions: 2
            };
            updateUI();
            updatePotionUI();
            showEventMessage('рЯЧСпЄП –°–±—А–Њ—И–µ–љ–Њ', false);
            for (let m of monsters) if (m.marker) map.removeLayer(m.marker);
            monsters = [];
            for (let obj of interactives) if (obj.marker) map.removeLayer(obj.marker);
            interactives = [];
            if (minion) { if (minion.marker) map.removeLayer(minion.marker); minion = null; }
        }
    }
    
    function loadGame() {
        const saved = localStorage.getItem('necromancer_save');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                player.lvl = data.lvl || 1;
                player.xp = data.xp || 0;
                player.gold = data.gold || 0;
                player.resources = data.resources || 0;
                player.hpPotions = data.hpPotions || 3;
                player.manaPotions = data.manaPotions || 2;
                player.maxHp = data.maxHp || 100;
                player.maxMana = data.maxMana || 100;
                player.hp = player.maxHp;
                player.mana = player.maxMana;
                updateUI();
                updatePotionUI();
                showEventMessage('рЯУА –Ч–∞–≥—А—Г–ґ–µ–љ–Њ', false);
            } catch(e) { console.log("–Ю—И–Є–±–Ї–∞"); }
        }
    }
    
    function initAudio() {
        if (audioEnabled) return;
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();
            const hitBuffer = ctx.createBuffer(1, 8000, 44100);
            const hitData = hitBuffer.getChannelData(0);
            for (let i = 0; i < 8000; i++) {
                let t = i / 44100, env = Math.exp(-t * 30);
                hitData[i] = (Math.sin(2 * Math.PI * 300 * t) + (Math.random() - 0.5) * 0.3) * env * 0.3;
            }
            const summonBuffer = ctx.createBuffer(1, 10000, 44100);
            const summonData = summonBuffer.getChannelData(0);
            for (let i = 0; i < 10000; i++) {
                let t = i / 44100, env = Math.exp(-t * 10);
                summonData[i] = Math.sin(2 * Math.PI * 150 * t) * env * 0.3;
            }
            const collectBuffer = ctx.createBuffer(1, 4000, 44100);
            const collectData = collectBuffer.getChannelData(0);
            for (let i = 0; i < 4000; i++) {
                let t = i / 44100, env = Math.exp(-t * 20);
                collectData[i] = Math.sin(2 * Math.PI * 800 * t) * env * 0.2;
            }
            const potionBuffer = ctx.createBuffer(1, 3000, 44100);
            const potionData = potionBuffer.getChannelData(0);
            for (let i = 0; i < 3000; i++) {
                let t = i / 44100, env = Math.exp(-t * 25);
                potionData[i] = Math.sin(2 * Math.PI * 600 * t) * env * 0.25;
            }
            hitSound = { play: () => { const c = new AudioContext(); const s = c.createBufferSource(); s.buffer = hitBuffer; s.connect(c.destination); s.start(); c.resume(); } };
            summonSound = { play: () => { const c = new AudioContext(); const s = c.createBufferSource(); s.buffer = summonBuffer; s.connect(c.destination); s.start(); c.resume(); } };
            collectSound = { play: () => { const c = new AudioContext(); const s = c.createBufferSource(); s.buffer = collectBuffer; s.connect(c.destination); s.start(); c.resume(); } };
            potionSound = { play: () => { const c = new AudioContext(); const s = c.createBufferSource(); s.buffer = potionBuffer; s.connect(c.destination); s.start(); c.resume(); } };
            audioEnabled = true;
        } catch(e) {}
    }
    
    function showEventMessage(msg, isError = false) {
        const el = document.getElementById('eventMessage');
        el.innerHTML = msg;
        el.style.color = isError ? '#ff8888' : '#ffcc66';
        setTimeout(() => { if (el.innerHTML === msg) el.innerHTML = 'рЯФЃ –У–Њ—В–Њ–≤'; }, 2000);
    }
    
    function updatePotionUI() {
        document.getElementById('hpPotionCount').innerText = player.hpPotions;
        document.getElementById('manaPotionCount').innerText = player.manaPotions;
    }
    
    function useHpPotion() {
        if (player.hpPotions <= 0) { showEventMessage('вЭМ –Э–µ—В –Ј–µ–ї–Є–є', true); return; }
        if (player.hp >= player.maxHp) { showEventMessage('вЭ§пЄП –Я–Њ–ї–љ–Њ–µ', true); return; }
        player.hp = Math.min(player.maxHp, player.hp + 50);
        player.hpPotions--;
        updateUI(); updatePotionUI();
        showEventMessage('рЯІ™ +50 HP');
        if (audioEnabled && potionSound) potionSound.play();
        hitFlash();
    }
    
    function useManaPotion() {
        if (player.manaPotions <= 0) { showEventMessage('вЭМ –Э–µ—В –Ј–µ–ї–Є–є –Љ–∞–љ—Л', true); return; }
        if (player.mana >= player.maxMana) { showEventMessage('рЯ™Д –Я–Њ–ї–љ–∞—П', true); return; }
        player.mana = Math.min(player.maxMana, player.mana + 30);
        player.manaPotions--;
        updateUI(); updatePotionUI();
        showEventMessage('рЯТІ +30 MP');
        if (audioEnabled && potionSound) potionSound.play();
        hitFlash();
    }
    
    function summonMinion() {
        if (!currentLocation) { showEventMessage('вЭМ –Э–µ—В GPS', true); return; }
        if (player.mana < SUMMON_MANA_COST) { showEventMessage('вЭМ –Э–µ—В –Љ–∞–љ—Л', true); return; }
        if (minion) { showEventMessage('вЭМ –Ь–Є–љ—М–Њ–љ —Г–ґ–µ –µ—Б—В—М', true); return; }
        player.mana -= SUMMON_MANA_COST;
        updateUI();
        const minionMarker = L.marker([currentLocation.lat, currentLocation.lng], {
            icon: L.divIcon({ html: `<div style="background:#4a4aff; width:32px; height:32px; border-radius:50%; border:2px solid #aaffff; display:flex; align-items:center; justify-content:center; font-size:22px;">рЯ™љрЯТА</div>`, iconSize:[32,32] })
        }).addTo(map);
        minion = { id: nextId++, marker: minionMarker, lat: currentLocation.lat, lng: currentLocation.lng, hp: 50, maxHp: 50, attackCd: 0, target: null };
        showEventMessage('рЯІЯ –Ь–Є–љ—М–Њ–љ –њ—А–Є–Ј–≤–∞–љ!');
        if (audioEnabled && summonSound) summonSound.play();
    }
    
    function updateMonstersMovement() {
        if (!currentLocation) return;
        for (let m of monsters) {
            const dx = currentLocation.lat - m.lat, dy = currentLocation.lng - m.lng;
            const len = Math.hypot(dx, dy);
            if (len > 0.00001) {
                const move = Math.min(ZOMBIE_SPEED, len);
                m.lat += dx/len*move; m.lng += dy/len*move;
                m.marker.setLatLng([m.lat, m.lng]);
            }
            const distToPlayer = distance(currentLocation.lat, currentLocation.lng, m.lat, m.lng);
            if (distToPlayer < 12 && (m.attackCd||0) <= 0) {
                player.hp = Math.max(0, player.hp - 8);
                updateUI();
                m.attackCd = 30;
                showEventMessage(`рЯІЯ –Р—В–∞–Ї–∞! -8 HP`, true);
                if (player.hp <= 0) {
                    player.hp = player.maxHp;
                    player.gold = Math.floor(player.gold * 0.7);
                    updateUI();
                    showEventMessage(`рЯТА –Т–Ю–°–Ъ–†–Х–®–Х–Э–Ш–Х`, true);
                }
                hitFlash();
            }
            if (m.attackCd > 0) m.attackCd--;
        }
    }
    
    function updateMinion() {
        if (!minion || !currentLocation) return;
        if (!minion.target || minion.target.hp <= 0) {
            let closest = null, minDist = 100;
            for (let m of monsters) {
                const d = distance(minion.lat, minion.lng, m.lat, m.lng);
                if (d < minDist) { minDist = d; closest = m; }
            }
            minion.target = closest;
        }
        if (minion.target) {
            const dx = minion.target.lat - minion.lat, dy = minion.target.lng - minion.lng;
            const len = Math.hypot(dx, dy);
            if (len > 0.00001) {
                const move = Math.min(MINION_SPEED, len);
                minion.lat += dx/len*move; minion.lng += dy/len*move;
                minion.marker.setLatLng([minion.lat, minion.lng]);
            }
            const distToTarget = distance(minion.lat, minion.lng, minion.target.lat, minion.target.lng);
            if (distToTarget < 15 && minion.attackCd <= 0) {
                minion.target.hp -= 15;
                minion.attackCd = 30;
                showEventMessage(`рЯТА –Ь–Є–љ—М–Њ–љ –∞—В–∞–Ї—Г–µ—В! ${minion.target.hp} вЭ§пЄП`);
                if (audioEnabled && hitSound) hitSound.play();
                if (minion.target.hp <= 0) killMonster(minion.target);
            }
            if (minion.attackCd > 0) minion.attackCd--;
        } else {
            const dx = currentLocation.lat - minion.lat, dy = currentLocation.lng - minion.lng;
            const len = Math.hypot(dx, dy);
            if (len > 0.00001) {
                const move = Math.min(MINION_SPEED, len);
                minion.lat += dx/len*move; minion.lng += dy/len*move;
                minion.marker.setLatLng([minion.lat, minion.lng]);
            }
        }
    }
    
    function initFog() {
        const canvas = document.getElementById('fogCanvas'), ctx = canvas.getContext('2d');
        function resize() { canvas.width = innerWidth; canvas.height = innerHeight; draw(); }
        window.addEventListener('resize', resize);
        resize();
        function draw() {
            if (!map) return;
            const bounds = map.getBounds(), tl = map.latLngToContainerPoint(bounds.getNorthWest()), br = map.latLngToContainerPoint(bounds.getSouthEast());
            canvas.width = br.x - tl.x; canvas.height = br.y - tl.y;
            canvas.style.left = tl.x + 'px'; canvas.style.top = tl.y + 'px';
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = 'rgba(0,0,0,0.88)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.globalCompositeOperation = 'destination-out';
            for (let c of revealedCircles) {
                const p = map.latLngToContainerPoint([c.lat, c.lng]);
                const r = c.radius / map.getZoomScale(map.getZoom());
                ctx.beginPath(); ctx.arc(p.x - tl.x, p.y - tl.y, r, 0, 2*Math.PI); ctx.fill();
            }
            ctx.globalCompositeOperation = 'source-over';
        }
        map.on('moveend zoomend', draw);
        window.drawFog = draw;
    }
    
    function revealArea(lat, lng) { revealedCircles.push({lat,lng, radius:FOG_RADIUS}); if(window.drawFog) window.drawFog(); }
    
    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([55.751244, 37.618423], currentZoom);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { attribution:'&copy; OSM', subdomains:'abcd', maxZoom:19 }).addTo(map);
        initFog();
        map.on('click', e => {
            const lat = e.latlng.lat, lng = e.latlng.lng;
            let closest = null, minD = 20;
            for (let m of monsters) { const d = distance(lat,lng,m.lat,m.lng); if (d<minD) { minD=d; closest=m; } }
            if (closest && activeMode === 'melee') { meleeAttack(closest); return; }
            for (let obj of interactives) { if (distance(lat,lng,obj.lat,obj.lng) < COLLECT_RADIUS) collectInteractive(obj); break; }
        });
    }
    
    function setZoom(z) { currentZoom = Math.min(100, Math.max(10, z)); document.getElementById('zoomValue').innerText = currentZoom; if(map) map.setZoom(currentZoom); if(currentLocation) centerOnPlayer(); }
    function zoomIn() { setZoom(currentZoom + 2); }
    function zoomOut() { setZoom(currentZoom - 2); }
    function centerOnPlayer() { if(currentLocation) map.setView([currentLocation.lat, currentLocation.lng], currentZoom); }
    
    function getPlayerIcon() { return L.divIcon({html:`<div style="background:#2c6e2c; width:34px; height:34px; border-radius:50%; border:3px solid #ffd966; display:flex; align-items:center; justify-content:center; font-size:22px;">рЯІЩвАНвЩВпЄП</div>`, iconSize:[34,34]}); }
    function getMonsterIcon(t) { let e='рЯІЯвАНвЩВпЄП'; if(t==='skeleton_melee') e='рЯТА'; else if(t==='skeleton_archer') e='рЯПє'; return L.divIcon({html:`<div style="background:#3a1a1a; width:30px; height:30px; border-radius:50%; border:2px solid #aa4444; display:flex; align-items:center; justify-content:center; font-size:20px;">${e}</div>`, iconSize:[30,30]}); }
    function getInteractiveIcon(t) { let e='рЯУ¶'; if(t==='barrel') e='рЯ™£'; if(t==='altar') e='рЯЧњ'; return L.divIcon({html:`<div style="background:#2a2a1a; width:28px; height:28px; border-radius:20%; border:1px solid #c9aa4b; display:flex; align-items:center; justify-content:center; font-size:20px;">${e}</div>`, iconSize:[28,28]}); }
    
    function updateUI() {
        document.getElementById('lvl').innerText = player.lvl;
        document.getElementById('xp').innerText = player.xp;
        document.getElementById('xpNext').innerText = player.lvl*100;
        document.getElementById('gold').innerText = player.gold;
        document.getElementById('resources').innerText = player.resources;
        document.getElementById('hpFillOrb').style.height = (player.hp/player.maxHp*100)+'%';
        document.getElementById('manaFillOrb').style.height = (player.mana/player.maxMana*100)+'%';
    }
    
    function setActiveMode(mode) {
        activeMode = mode;
        const melee = document.getElementById('meleeBtn'), summon = document.getElementById('summonBtn'), info = document.getElementById('infoCenter');
        if (mode === 'melee') { melee.classList.add('active'); summon.classList.remove('active'); info.innerHTML = 'вЪФпЄП –£–і–∞—А'; }
        else { melee.classList.remove('active'); summon.classList.add('active'); info.innerHTML = 'рЯІЯ –Я—А–Є–Ј—Л–≤ (50)'; }
    }
    
    function distance(lat1,lng1,lat2,lng2) { const R=6371000, ѕЖ1=lat1*Math.PI/180, ѕЖ2=lat2*Math.PI/180, ќФѕЖ=(lat2-lat1)*Math.PI/180, ќФќї=(lng2-lng1)*Math.PI/180, a=Math.sin(ќФѕЖ/2)**2+Math.cos(ѕЖ1)*Math.cos(ѕЖ2)*Math.sin(ќФќї/2)**2; return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); }
    
    function meleeAttack(m) {
        if (!currentLocation) return;
        const d = distance(currentLocation.lat, currentLocation.lng, m.lat, m.lng);
        if (d > MELEE_RANGE) { showEventMessage(`вЭМ –Ф–∞–ї–µ–Ї–Њ (${Math.floor(d)}–Љ)`, true); return; }
        m.hp -= 25;
        showEventMessage(`вЪФпЄП –£–і–∞—А! ${m.hp} вЭ§пЄП`);
        if (audioEnabled && hitSound) hitSound.play();
        if (m.hp <= 0) killMonster(m);
        hitFlash();
    }
    
    function killMonster(m) {
        const gainXp = 20 + Math.floor(Math.random()*10);
        const gainGold = 8 + Math.floor(Math.random()*12);
        player.xp += gainXp;
        player.gold += gainGold;
        if (Math.random() < 0.4) player.hpPotions++;
        if (Math.random() < 0.35) player.manaPotions++;
        updatePotionUI();
        const need = player.lvl*100;
        if (player.xp >= need) {
            player.lvl++; player.xp -= need; player.maxHp += 15; player.hp = player.maxHp; player.maxMana += 10; player.mana = player.maxMana;
            showEventMessage(`рЯОЙ –£–†–Ю–Т–Х–Э–ђ ${player.lvl}!`);
        }
        updateUI();
        removeMonster(m.id);
        showEventMessage(`рЯТА +${gainXp} XP, +${gainGold} рЯ™Щ`);
        if (Math.random()<0.3) addInteractive(m.lat, m.lng, Math.random()<0.7?'barrel':'chest');
        if (minion && minion.target === m) minion.target = null;
    }
    
    function hitFlash() { const f = document.createElement('div'); f.className = 'hit-effect'; document.body.appendChild(f); setTimeout(()=>f.remove(),200); }
    
    function addInteractive(lat,lng,type) {
        const id = nextId++;
        const marker = L.marker([lat,lng], {icon: getInteractiveIcon(type)}).addTo(map);
        let g=0, m=0;
        if (type==='chest') { g=20+Math.floor(Math.random()*40); m=10; }
        if (type==='barrel') g=5+Math.floor(Math.random()*10);
        if (type==='altar') m=15;
        interactives.push({id,lat,lng,type,gold:g,mana:m,marker});
    }
    
    function collectInteractive(obj) {
        if (obj.type === 'altar') {
            player.hp = player.maxHp; player.mana = player.maxMana;
            showEventMessage(`рЯЧњ –Р–ї—В–∞—А—М –≤–Њ—Б—Б—В–∞–љ–Њ–≤–Є–ї –≤—Б—С!`);
            if (audioEnabled && collectSound) collectSound.play();
        } else {
            player.gold += obj.gold; player.mana = Math.min(player.maxMana, player.mana+obj.mana);
            player.resources++;
            showEventMessage(`рЯУ¶ +${obj.gold}рЯ™Щ +${obj.mana}рЯ™Д`);
            if (audioEnabled && collectSound) collectSound.play();
        }
        updateUI();
        if (obj.marker) map.removeLayer(obj.marker);
        const idx = interactives.findIndex(i=>i.id===obj.id);
        if (idx!==-1) interactives.splice(idx,1);
    }
    
    function addMonster(lat,lng,type) {
        let hp=32; if(type==='skeleton_melee') hp=26; if(type==='skeleton_archer') hp=22;
        const id=nextId++, marker=L.marker([lat,lng],{icon:getMonsterIcon(type)}).addTo(map);
        monsters.push({id,lat,lng,type,hp,marker, attackCd:0});
    }
    function removeMonster(id) { const idx=monsters.findIndex(m=>m.id===id); if(idx!==-1){ if(monsters[idx].marker) map.removeLayer(monsters[idx].marker); monsters.splice(idx,1); } }
    function spawnMonsterNear(lat,lng) {
        if(monsters.length>=MAX_MONSTERS) return;
        const ang=Math.random()*2*Math.PI, dist=MIN_SPAWN_DIST+Math.random()*SPAWN_RADIUS;
        const dLat=(dist*Math.cos(ang))/111320, dLng=(dist*Math.sin(ang))/(111320*Math.cos(lat*Math.PI/180));
        let newLat=lat+dLat, newLng=lng+dLng;
        newLat=Math.min(90,Math.max(-90,newLat)); newLng=Math.min(180,Math.max(-180,newLng));
        const r=Math.random(); let type='zombie';
        if(r<0.3) type='skeleton_melee'; else if(r<0.45) type='skeleton_archer';
        addMonster(newLat,newLng,type);
    }
    
    function updatePlayerOnMap(lat,lng,acc) {
        if(playerMarker) map.removeLayer(playerMarker);
        if(accuracyCircle) map.removeLayer(accuracyCircle);
        playerMarker = L.marker([lat,lng],{icon:getPlayerIcon()}).addTo(map);
        if(acc<300) accuracyCircle = L.circle([lat,lng],{radius:acc,color:'#8bc34a',weight:1,fillOpacity:0.1}).addTo(map);
        document.getElementById('gpsLed').classList.add('active');
        document.getElementById('statusText').innerHTML = 'рЯЯҐ';
        centerOnPlayer();
        revealArea(lat,lng);
    }
    
    function onLocation(pos) {
        const {latitude:lat, longitude:lng, accuracy} = pos.coords;
        currentLocation = {lat,lng,accuracy};
        updatePlayerOnMap(lat,lng,accuracy);
        if(monsters.length<3) for(let i=0;i<2;i++) spawnMonsterNear(lat,lng);
        if(interactives.length<3 && Math.random()<0.1) addInteractive(lat+(Math.random()-0.5)*0.001,lng+(Math.random()-0.5)*0.001,'barrel');
    }
    
    function startGPS() {
        if(!navigator.geolocation) { showEventMessage('вЭМ –Э–µ—В GPS',true); document.getElementById('statusText').innerHTML = 'вЭМ'; return; }
        document.getElementById('statusText').innerHTML = 'вП≥';
        navigator.geolocation.getCurrentPosition(
            (pos)=>{ if(watchId) navigator.geolocation.clearWatch(watchId); watchId=navigator.geolocation.watchPosition(onLocation,()=>showEventMessage('вЭМ –Ю—И–Є–±–Ї–∞',true),{enableHighAccuracy:true,maximumAge:0,timeout:10000}); onLocation(pos); },
            ()=>{ showEventMessage('вЭМ –†–∞–Ј—А–µ—И–Є—В–µ GPS',true); document.getElementById('statusText').innerHTML = 'вЭМ'; },
            {enableHighAccuracy:true,timeout:10000}
        );
    }
    
    window.onload = () => {
        initMap(); startGPS();
        loadGame();
        
        document.getElementById('zoomIn').onclick = zoomIn;
        document.getElementById('zoomOut').onclick = zoomOut;
        document.getElementById('zoomValue').innerText = currentZoom;
        document.getElementById('saveBtn').onclick = saveGame;
        document.getElementById('resetBtn').onclick = resetGame;
        
        document.getElementById('meleeBtn').onclick = () => setActiveMode('melee');
        document.getElementById('summonBtn').onclick = () => { if(activeMode==='summon') summonMinion(); else setActiveMode('summon'); };
        document.getElementById('hpPotionBtn').onclick = useHpPotion;
        document.getElementById('manaPotionBtn').onclick = useManaPotion;
        setActiveMode('melee');
        updateUI(); updatePotionUI();
        const enableAudio = () => { initAudio(); document.removeEventListener('touchstart', enableAudio); document.removeEventListener('click', enableAudio); };
        document.addEventListener('touchstart', enableAudio);
        document.addEventListener('click', enableAudio);
        setTimeout(() => { if(currentLocation) for(let i=0;i<3;i++) spawnMonsterNear(currentLocation.lat,currentLocation.lng);
        else { addMonster(55.751244,37.618423,'zombie'); addMonster(55.7515,37.6188,'skeleton_melee'); } }, 2000);
        setInterval(() => { updateMonstersMovement(); updateMinion(); }, 500);
    };
</script>
