<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚔️ Некромант | Прицельный обзор | Ходячие зомби</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body, html { height: 100%; font-family: system-ui, sans-serif; background: #0a0f1a; overflow: hidden; }
        #map { height: 100%; width: 100%; z-index: 1; }
        #fogCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }
        
        /* Верхняя панель */
        .top-stats {
            position: fixed;
            top: 12px;
            left: 12px;
            right: 12px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 8px 20px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #d4af37;
            font-size: 0.9rem;
            color: #ffefb9;
        }
        .stats-left { display: flex; gap: 20px; flex-wrap: wrap; }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.6);
            padding: 4px 16px;
            border-radius: 40px;
        }
        .event-area {
            background: rgba(0,0,0,0.6);
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #ffcc66;
            max-width: 350px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        /* Кнопки действий */
        .action-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 60px;
            z-index: 1000;
            border: 1px solid #d4af37;
        }
        .action-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #2a2a1a;
            border: 2px solid #d4af37;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            position: relative;
        }
        .action-btn.active { background: #d4a017; box-shadow: 0 0 15px gold; }
        .potion-count {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: #1a1a1a;
            color: #ffcc66;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 20px;
            border: 1px solid #d4af37;
        }
        .hp-potion { background: #8b0000; }
        .mana-potion { background: #00008b; }
        
        .hit-effect {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,0,0,0.3);
            pointer-events: none;
            z-index: 999;
            animation: hitFlash 0.2s;
        }
        @keyframes hitFlash { 0% { opacity: 1; } 100% { opacity: 0; } }
        
        .led { width: 10px; height: 10px; border-radius: 50%; background-color: #f80; display: inline-block; }
        .led.active { background-color: #8bc34a; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }
        
        @media (max-width: 700px) {
            .action-btn { width: 50px; height: 50px; font-size: 20px; }
            .stats-left { gap: 8px; }
            .stat-item { padding: 2px 10px; font-size: 0.7rem; }
            .event-area { max-width: 150px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

<div id="map"></div>
<canvas id="fogCanvas"></canvas>

<div class="top-stats">
    <div class="stats-left">
        <div class="stat-item">💀 Ур. <span id="lvl">1</span></div>
        <div class="stat-item">✨ Опыт <span id="xp">0</span>/<span id="xpNext">100</span></div>
        <div class="stat-item">🪙 Золото <span id="gold">0</span></div>
        <div class="stat-item">📦 <span id="resources">0</span></div>
        <div class="stat-item gps-item"><span class="led" id="gpsLed"></span><span id="statusText">🌍 Запрос...</span></div>
    </div>
    <div class="event-area" id="eventMessage">🔮 Игра готова</div>
</div>

<div class="action-bar">
    <div class="action-btn" id="meleeBtn">⚔️</div>
    <div class="action-btn" id="summonBtn">💀<span class="potion-count" id="summonCost">50</span></div>
    <div class="action-btn hp-potion" id="hpPotionBtn">🧪<span class="potion-count" id="hpPotionCount">3</span></div>
    <div class="action-btn mana-potion" id="manaPotionBtn">💧<span class="potion-count" id="manaPotionCount">2</span></div>
</div>

<script>
    // ============================================================
    //  НЕКРОМАНТ | ПРИЦЕЛЬНЫЙ ЗУМ 17 | ХОДЯЧИЕ ЗОМБИ | УЛУЧШАЮЩИЙСЯ МИНЬОН
    // ============================================================
    
    let map, playerMarker, watchId, currentLocation;
    let revealedCircles = [];
    const FOG_RADIUS = 70;
    let monsters = [], interactives = [], minion = null;
    let nextId = 1;
    let activeMode = 'melee';
    let audioEnabled = false;
    
    let player = {
        lvl: 1, hp: 100, maxHp: 100, mana: 100, maxMana: 100,
        xp: 0, gold: 0, resources: 0, hpPotions: 3, manaPotions: 2
    };
    
    const MAX_MONSTERS = 6;
    const SPAWN_RADIUS = 50;      // Ближе к игроку
    const MIN_SPAWN_DIST = 20;
    const COLLECT_RADIUS = 8;
    const MELEE_RANGE = 15;
    const ZOMBIE_SPEED = 0.00003;
    const MINION_SPEED = 0.00005;
    
    // ---- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----
    function distance(lat1,lng1,lat2,lng2) {
        const R=6371000, φ1=lat1*Math.PI/180, φ2=lat2*Math.PI/180;
        const Δφ=(lat2-lat1)*Math.PI/180, Δλ=(lng2-lng1)*Math.PI/180;
        const a=Math.sin(Δφ/2)**2+Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
        return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
    
    // Проверка видимости: на улице обычно прямая видимость до 50 метров
    function isVisible(lat1,lng1,lat2,lng2) {
        const dist = distance(lat1,lng1,lat2,lng2);
        if (dist < 40) return true;
        // за домами/углами шанс потерять видимость растёт
        return Math.random() > (dist-40)/60;
    }
    
    // ---- ИНИЦИАЛИЗАЦИЯ КАРТЫ (ЗУМ 17 — видно одну улицу) ----
    function initMap() {
        map = L.map('map', { zoomControl: false, attributionControl: false }).setView([55.751244, 37.618423], 17);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OSM',
            subdomains: 'abcd',
            maxZoom: 19
        }).addTo(map);
        
        // Туман войны
        const canvas = document.getElementById('fogCanvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawFog();
        }
        window.addEventListener('resize', resizeCanvas);
        function drawFog() {
            if (!map) return;
            const bounds = map.getBounds();
            const tl = map.latLngToContainerPoint(bounds.getNorthWest());
            const br = map.latLngToContainerPoint(bounds.getSouthEast());
            canvas.width = br.x - tl.x;
            canvas.height = br.y - tl.y;
            canvas.style.left = tl.x + 'px';
            canvas.style.top = tl.y + 'px';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(0,0,0,0.88)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'destination-out';
            for (let circ of revealedCircles) {
                const point = map.latLngToContainerPoint([circ.lat, circ.lng]);
                const rPx = circ.radius / map.getZoomScale(map.getZoom());
                ctx.beginPath();
                ctx.arc(point.x - tl.x, point.y - tl.y, rPx, 0, 2*Math.PI);
                ctx.fill();
            }
            ctx.globalCompositeOperation = 'source-over';
        }
        map.on('moveend zoomend', drawFog);
        window.drawFog = drawFog;
        
        // КЛИК — атака по монстру (только если видим и в пределах досягаемости)
        map.on('click', (e) => {
            if (!currentLocation) return;
            const clickLat = e.latlng.lat;
            const clickLng = e.latlng.lng;
            let closestMonster = null;
            let minDist = MELEE_RANGE + 5;
            for (let m of monsters) {
                const d = distance(clickLat, clickLng, m.lat, m.lng);
                if (d < minDist && isVisible(clickLat, clickLng, m.lat, m.lng)) {
                    minDist = d;
                    closestMonster = m;
                }
            }
            if (closestMonster && activeMode === 'melee') {
                const playerDist = distance(currentLocation.lat, currentLocation.lng, closestMonster.lat, closestMonster.lng);
                if (playerDist <= MELEE_RANGE && isVisible(currentLocation.lat, currentLocation.lng, closestMonster.lat, closestMonster.lng)) {
                    meleeAttack(closestMonster);
                } else {
                    showEventMessage(`❌ Слишком далеко (${Math.floor(playerDist)}м) или за стеной`, true);
                }
                return;
            }
            // Сбор лута
            for (let obj of interactives) {
                if (distance(clickLat, clickLng, obj.lat, obj.lng) < COLLECT_RADIUS) {
                    collectInteractive(obj);
                    break;
                }
            }
        });
    }
    
    function centerOnPlayer() {
        if (currentLocation) map.setView([currentLocation.lat, currentLocation.lng], 17);
    }
    
    function revealArea(lat, lng) {
        revealedCircles.push({ lat, lng, radius: FOG_RADIUS });
        if (window.drawFog) window.drawFog();
    }
    
    // ---- UI ----
    function updateUI() {
        document.getElementById('lvl').innerText = player.lvl;
        document.getElementById('xp').innerText = player.xp;
        document.getElementById('xpNext').innerText = player.lvl*100;
        document.getElementById('gold').innerText = player.gold;
        document.getElementById('resources').innerText = player.resources;
        document.getElementById('hpPotionCount').innerText = player.hpPotions;
        document.getElementById('manaPotionCount').innerText = player.manaPotions;
    }
    
    function showEventMessage(msg, isError=false) {
        const el = document.getElementById('eventMessage');
        el.innerHTML = msg;
        el.style.color = isError ? '#ff8888' : '#ffcc66';
        setTimeout(() => { if(el.innerHTML === msg) el.innerHTML = '💀 Готов к бою'; }, 2500);
    }
    
    function hitFlash() {
        const flash = document.createElement('div');
        flash.className = 'hit-effect';
        document.body.appendChild(flash);
        setTimeout(() => flash.remove(), 200);
    }
    
    // ---- БОЙ ----
    function meleeAttack(monster) {
        if (!currentLocation) return;
        const dist = distance(currentLocation.lat, currentLocation.lng, monster.lat, monster.lng);
        if (dist > MELEE_RANGE) {
            showEventMessage(`❌ Далеко (${Math.floor(dist)}м)`, true);
            return;
        }
        if (!isVisible(currentLocation.lat, currentLocation.lng, monster.lat, monster.lng)) {
            showEventMessage(`❌ За стеной!`, true);
            return;
        }
        monster.hp -= 25;
        showEventMessage(`⚔️ Удар! ${monster.hp} ❤️`);
        if (monster.hp <= 0) killMonster(monster);
        hitFlash();
    }
    
    function killMonster(monster) {
        const gainXp = 20 + Math.floor(Math.random()*10);
        const gainGold = 8 + Math.floor(Math.random()*12);
        player.xp += gainXp;
        player.gold += gainGold;
        if (Math.random() < 0.2) player.hpPotions++;
        if (Math.random() < 0.15) player.manaPotions++;
        
        const xpNeeded = player.lvl*100;
        if (player.xp >= xpNeeded) {
            player.lvl++;
            player.xp -= xpNeeded;
            player.maxHp += 15;
            player.hp = player.maxHp;
            player.maxMana += 10;
            player.mana = player.maxMana;
            showEventMessage(`🎉 УРОВЕНЬ ${player.lvl}!`);
            // Улучшение миньона (пересоздаём, если активен)
            if (minion) {
                const oldLat = minion.lat, oldLng = minion.lng;
                if (minion.marker) map.removeLayer(minion.marker);
                const newIcon = L.divIcon({html:`<div style="background:#4a2a6a; width:34px; height:34px; border-radius:50%; border:2px solid #ffaa00; display:flex; align-items:center; justify-content:center; font-size:22px;">💀⭐</div>`, iconSize:[34,34]});
                const marker = L.marker([oldLat, oldLng], {icon: newIcon}).addTo(map);
                minion = { marker, lat: oldLat, lng: oldLng, hp: 50 + player.lvl*5, attackCd: 0, target: null };
                showEventMessage(`🧟 Миньон усилился до ${player.lvl} уровня!`);
            }
        }
        updateUI();
        removeMonster(monster.id);
        showEventMessage(`💀 +${gainXp} XP, +${gainGold} 🪙`);
        if (Math.random() < 0.3) addInteractive(monster.lat, monster.lng, Math.random()<0.7?'barrel':'chest');
        if (minion && minion.target === monster) minion.target = null;
    }
    
    // ---- ДВИЖЕНИЕ ЗОМБИ (ИДУТ К ИГРОКУ) ----
    function updateMonstersMovement() {
        if (!currentLocation) return;
        for (let m of monsters) {
            // Направление к игроку
            const dx = currentLocation.lat - m.lat;
            const dy = currentLocation.lng - m.lng;
            const len = Math.hypot(dx, dy);
            if (len > 0.00001) {
                const move = Math.min(ZOMBIE_SPEED, len);
                m.lat += dx / len * move;
                m.lng += dy / len * move;
                m.marker.setLatLng([m.lat, m.lng]);
            }
            // Атака, если подошли близко
            const distToPlayer = distance(currentLocation.lat, currentLocation.lng, m.lat, m.lng);
            if (distToPlayer < 12 && (m.attackCd || 0) <= 0) {
                player.hp = Math.max(0, player.hp - 8);
                updateUI();
                m.attackCd = 30;
                showEventMessage(`🧟 Зомби атакует! -8 HP`, true);
                if (player.hp <= 0) {
                    player.hp = player.maxHp;
                    player.gold = Math.floor(player.gold * 0.7);
                    updateUI();
                    showEventMessage(`💀 ВОСКРЕШЕНИЕ...`, true);
                }
                hitFlash();
            }
            if (m.attackCd > 0) m.attackCd--;
        }
    }
    
    // ---- МИНЬОН (улучшается с уровнем) ----
    function summonMinion(){
        if(!currentLocation) return;
        if(player.mana<50){ showEventMessage('❌ Нет маны',true); return; }
        if(minion){ showEventMessage('❌ Уже есть миньон',true); return; }
        player.mana-=50;
        updateUI();
        const levelBonus = Math.floor(player.lvl / 2);
        const minionHp = 50 + levelBonus * 10;
        const iconHtml = player.lvl >= 5 ? '💀⭐' : '💀';
        const iconColor = player.lvl >= 5 ? '#ffaa00' : '#aaaaff';
        const minionIcon = L.divIcon({html:`<div style="background:#2a2a5a; width:34px; height:34px; border-radius:50%; border:2px solid ${iconColor}; display:flex; align-items:center; justify-content:center; font-size:22px;">${iconHtml}</div>`, iconSize:[34,34]});
        const marker = L.marker([currentLocation.lat, currentLocation.lng], {icon: minionIcon}).addTo(map);
        minion = { marker, lat: currentLocation.lat, lng: currentLocation.lng, hp: minionHp, attackCd: 0, target: null };
        showEventMessage(`🧟 Миньон призван (уровень ${player.lvl})`);
    }
    
    function updateMinion(){
        if(!minion || !currentLocation) return;
        // Поиск цели
        let target = null;
        let minDist = 100;
        for(let m of monsters){
            const d = distance(minion.lat, minion.lng, m.lat, m.lng);
            if(d < minDist){
                minDist = d;
                target = m;
            }
        }
        if(target){
            const dx = target.lat - minion.lat;
            const dy = target.lng - minion.lng;
            const len = Math.hypot(dx, dy);
            if(len > 0.00001){
                const move = Math.min(MINION_SPEED, len);
                minion.lat += dx / len * move;
                minion.lng += dy / len * move;
                minion.marker.setLatLng([minion.lat, minion.lng]);
            }
            if(minDist < 15 && (minion.attackCd || 0) <= 0){
                target.hp -= 15 + Math.floor(player.lvl/2);
                minion.attackCd = 30;
                showEventMessage(`💀 Миньон атакует! ${target.hp} ❤️`);
                if(target.hp <= 0) killMonster(target);
            }
        } else {
            // Идём к игроку
            const dx = currentLocation.lat - minion.lat;
            const dy = currentLocation.lng - minion.lng;
            const len = Math.hypot(dx, dy);
            if(len > 0.00001){
                const move = Math.min(MINION_SPEED, len);
                minion.lat += dx / len * move;
                minion.lng += dy / len * move;
                minion.marker.setLatLng([minion.lat, minion.lng]);
            }
        }
        if(minion.attackCd > 0) minion.attackCd--;
    }
    
    // ---- МИР (ИКОНКИ) ----
    function getPlayerIcon() {
        return L.divIcon({html:`<div style="background:#1a1a2a; width:36px; height:36px; border-radius:50%; border:3px solid #aa66ff; display:flex; align-items:center; justify-content:center; font-size:22px; box-shadow:0 0 12px #aa66ff;">💀🧙</div>`, iconSize:[36,36]});
    }
    function getMonsterIcon(type) {
        let emoji = '🧟‍♂️';
        if(type === 'skeleton_melee') emoji = '💀⚔️';
        else if(type === 'skeleton_archer') emoji = '🏹💀';
        return L.divIcon({html:`<div style="background:#2a1a1a; width:30px; height:30px; border-radius:50%; border:2px solid #aa4444; display:flex; align-items:center; justify-content:center; font-size:20px;">${emoji}</div>`, iconSize:[30,30]});
    }
    function getInteractiveIcon(type) {
        let e='📦';
        if(type==='barrel') e='🪣';
        if(type==='altar') e='🗿';
        return L.divIcon({html:`<div style="background:#2a2a1a; width:28px; height:28px; border-radius:20%; border:1px solid #c9aa4b; display:flex; align-items:center; justify-content:center; font-size:20px;">${e}</div>`, iconSize:[28,28]});
    }
    
    function addMonster(lat,lng,type){
        let hp=32; if(type==='skeleton_melee') hp=26; if(type==='skeleton_archer') hp=22;
        const id=nextId++, marker=L.marker([lat,lng],{icon:getMonsterIcon(type)}).addTo(map);
        marker.bindTooltip(`🩸 ${hp} HP`, {permanent: false, direction:'top'});
        monsters.push({id,lat,lng,type,hp,marker, attackCd:0});
    }
    function removeMonster(id){
        const idx=monsters.findIndex(m=>m.id===id);
        if(idx!==-1){
            if(monsters[idx].marker) map.removeLayer(monsters[idx].marker);
            monsters.splice(idx,1);
        }
    }
    function addInteractive(lat,lng,type){
        const id=nextId++, gold=0, mana=0;
        let g=0,m=0;
        if(type==='chest'){ g=20+Math.floor(Math.random()*40); m=10; }
        if(type==='barrel') g=5+Math.floor(Math.random()*10);
        if(type==='altar') m=15;
        const marker=L.marker([lat,lng],{icon:getInteractiveIcon(type)}).addTo(map);
        interactives.push({id,lat,lng,type,gold:g,mana:m,marker});
    }
    function collectInteractive(obj){
        if(obj.type==='altar'){
            player.hp=player.maxHp; player.mana=player.maxMana;
            showEventMessage(`🗿 Алтарь восстановил всё!`);
        } else {
            player.gold+=obj.gold; player.mana=Math.min(player.maxMana, player.mana+obj.mana);
            player.resources++;
            showEventMessage(`📦 +${obj.gold}🪙 +${obj.mana}🪄`);
        }
        updateUI();
        if(obj.marker) map.removeLayer(obj.marker);
        const idx=interactives.findIndex(i=>i.id===obj.id);
        if(idx!==-1) interactives.splice(idx,1);
    }
    function spawnMonsterNear(lat,lng){
        if(monsters.length>=MAX_MONSTERS) return;
        const ang=Math.random()*2*Math.PI, dist=MIN_SPAWN_DIST+Math.random()*SPAWN_RADIUS;
        const dLat=(dist*Math.cos(ang))/111320, dLng=(dist*Math.sin(ang))/(111320*Math.cos(lat*Math.PI/180));
        let newLat=lat+dLat, newLng=lng+dLng;
        newLat=Math.min(90,Math.max(-90,newLat)); newLng=Math.min(180,Math.max(-180,newLng));
        const r=Math.random();
        let type='zombie';
        if(r<0.3) type='skeleton_melee';
        else if(r<0.45) type='skeleton_archer';
        addMonster(newLat,newLng,type);
    }
    
    // ---- GPS ----
    function updatePlayerOnMap(lat,lng,acc){
        if(playerMarker) map.removeLayer(playerMarker);
        playerMarker=L.marker([lat,lng],{icon:getPlayerIcon()}).addTo(map);
        document.getElementById('gpsLed').classList.add('active');
        document.getElementById('statusText').innerHTML='🟢 Активен';
        centerOnPlayer();
        revealArea(lat,lng);
        // Обновляем расстояния в тултипах монстров
        for(let m of monsters){
            const dist = Math.floor(distance(lat,lng,m.lat,m.lng));
            m.marker.bindTooltip(`🩸 ${m.hp} HP | ${dist}м`, {permanent: false, direction:'top'});
        }
    }
    function onLocation(pos){
        const {latitude:lat, longitude:lng, accuracy}=pos.coords;
        currentLocation={lat,lng,accuracy};
        updatePlayerOnMap(lat,lng,accuracy);
        if(monsters.length<3) for(let i=0;i<2;i++) spawnMonsterNear(lat,lng);
        if(interactives.length<3 && Math.random()<0.1) addInteractive(lat+(Math.random()-0.5)*0.001,lng+(Math.random()-0.5)*0.001,'barrel');
    }
    function startGPS(){
        if(!navigator.geolocation){ showEventMessage('❌ Нет GPS',true); return; }
        navigator.geolocation.getCurrentPosition(
            (pos)=>{ if(watchId) navigator.geolocation.clearWatch(watchId); watchId=navigator.geolocation.watchPosition(onLocation,()=>showEventMessage('❌ Ошибка GPS',true),{enableHighAccuracy:true,maximumAge:0,timeout:10000}); onLocation(pos); },
            ()=>showEventMessage('❌ Разрешите GPS',true),
            {enableHighAccuracy:true,timeout:10000}
        );
    }
    
    // ---- ЗАПУСК ----
    window.onload=()=>{
        initMap();
        startGPS();
        document.getElementById('meleeBtn').onclick=()=>{ activeMode='melee'; document.getElementById('meleeBtn').classList.add('active'); document.getElementById('summonBtn').classList.remove('active'); showEventMessage('Режим: Удар'); };
        document.getElementById('summonBtn').onclick=()=>{ if(activeMode==='summon') summonMinion(); else { activeMode='summon'; document.getElementById('summonBtn').classList.add('active'); document.getElementById('meleeBtn').classList.remove('active'); showEventMessage('Режим: Призыв'); } };
        document.getElementById('hpPotionBtn').onclick=()=>{ if(player.hpPotions>0 && player.hp<player.maxHp){ player.hp=Math.min(player.maxHp, player.hp+50); player.hpPotions--; updateUI(); showEventMessage('🧪 Лечение +50 HP'); hitFlash(); } else showEventMessage('❌ Нет зелий или HP полное',true); };
        document.getElementById('manaPotionBtn').onclick=()=>{ if(player.manaPotions>0 && player.mana<player.maxMana){ player.mana=Math.min(player.maxMana, player.mana+30); player.manaPotions--; updateUI(); showEventMessage('💧 Мана +30'); } else showEventMessage('❌ Нет зелий маны',true); };
        updateUI();
        setTimeout(()=>{
            if(currentLocation) for(let i=0;i<3;i++) spawnMonsterNear(currentLocation.lat,currentLocation.lng);
            else { addMonster(55.751244,37.618423,'zombie'); addMonster(55.7515,37.6188,'skeleton_melee'); }
        },2000);
        setInterval(()=>{
            updateMonstersMovement();
            updateMinion();
        }, 800);
        // нет авторегенерации
    };
</script>
</body>
</html>
