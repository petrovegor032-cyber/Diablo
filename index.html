<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Diablo Geo - простая версия</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: monospace; background: #000; overflow: hidden; }
        #map { height: 100%; width: 100%; }
        
        /* Верхняя панель — только текст */
        .top-bar {
            position: fixed;
            top: 10px;
            left: 10px;
            right: 10px;
            background: black;
            color: #ffcc66;
            padding: 8px 12px;
            border-radius: 20px;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 12px;
            border: 1px solid #d4af37;
        }
        
        /* Кнопки атаки справа */
        .actions {
            position: fixed;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: black;
            padding: 10px;
            border-radius: 30px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid #d4af37;
        }
        .action-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            background: #5a3a1a;
            color: white;
        }
        .action-btn.active {
            background: #d4a017;
            color: black;
            box-shadow: 0 0 10px gold;
        }
        
        /* Нижняя панель — простые полоски */
        .bottom-bars {
            position: fixed;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 20px;
            z-index: 1000;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            border: 1px solid #d4af37;
        }
        .bar-container {
            flex: 1;
        }
        .bar-label {
            font-size: 10px;
            color: #ffcc66;
            margin-bottom: 4px;
        }
        .bar-bg {
            background: #330000;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
        }
        .bar-fill {
            width: 100%;
            height: 100%;
            background: #e34d4d;
            transition: width 0.2s;
        }
        .mana-bg { background: #001133; }
        .mana-fill { background: #4d7ae3; }
        
        .info-text {
            text-align: center;
            padding: 5px;
            font-size: 11px;
            color: white;
            background: black;
            border-radius: 20px;
            min-width: 120px;
        }
        
        .hit-effect {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,0,0,0.3);
            pointer-events: none;
            z-index: 999;
            animation: flash 0.2s;
        }
        @keyframes flash { 0% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

<div id="map"></div>

<div class="top-bar">
    <span>🧙 Ур.<span id="lvl">1</span></span>
    <span>✨ <span id="xp">0</span>/<span id="xpNext">100</span></span>
    <span>🪙 <span id="gold">0</span></span>
    <span>📦 <span id="res">0</span></span>
    <span id="gpsStatus" style="color:#88ff88;">🛰️ Запрос...</span>
</div>

<div class="actions">
    <button id="meleeBtn" class="action-btn active">⚔️</button>
    <button id="fireBtn" class="action-btn">🔥</button>
</div>

<div class="bottom-bars">
    <div class="bar-container">
        <div class="bar-label">❤️ Здоровье <span id="hpVal">100</span>/<span id="hpMax">100</span></div>
        <div class="bar-bg"><div class="bar-fill" id="hpFill" style="width:100%"></div></div>
    </div>
    <div class="info-text" id="modeText">⚔️ Удар (бесплатно)</div>
    <div class="bar-container">
        <div class="bar-label">🪄 Мана <span id="manaVal">100</span>/<span id="manaMax">100</span></div>
        <div class="bar-bg mana-bg"><div class="bar-fill mana-fill" id="manaFill" style="width:100%"></div></div>
    </div>
</div>

<script>
    // ========== Diablo Geo - МАКСИМАЛЬНО ПРОСТАЯ ВЕРСИЯ ==========
    
    let map, playerMarker, watchId, currentLocation = null;
    let monsters = [], interactives = [], nextId = 1;
    let activeMode = 'melee';
    
    let player = {
        lvl: 1, hp: 100, maxHp: 100, mana: 100, maxMana: 100,
        xp: 0, gold: 0, res: 0
    };
    
    const MAX_MONSTERS = 6, SPAWN_RADIUS = 70, MIN_DIST = 30, FIRE_RANGE = 50;
    
    function updateUI() {
        document.getElementById('lvl').innerText = player.lvl;
        document.getElementById('hpVal').innerText = Math.max(0, player.hp);
        document.getElementById('hpMax').innerText = player.maxHp;
        document.getElementById('manaVal').innerText = Math.floor(player.mana);
        document.getElementById('manaMax').innerText = player.maxMana;
        document.getElementById('gold').innerText = player.gold;
        document.getElementById('xp').innerText = player.xp;
        document.getElementById('xpNext').innerText = player.lvl * 100;
        document.getElementById('res').innerText = player.res;
        document.getElementById('hpFill').style.width = (player.hp/player.maxHp*100)+'%';
        document.getElementById('manaFill').style.width = (player.mana/player.maxMana*100)+'%';
    }
    
    function setMode(mode) {
        activeMode = mode;
        let melee = document.getElementById('meleeBtn'), fire = document.getElementById('fireBtn'), txt = document.getElementById('modeText');
        if (mode === 'melee') {
            melee.classList.add('active'); fire.classList.remove('active');
            txt.innerHTML = '⚔️ Удар (бесплатно)';
        } else {
            fire.classList.add('active'); melee.classList.remove('active');
            txt.innerHTML = '🔥 Огонь (30 маны, 50м)';
        }
    }
    
    function dist(lat1,lng1,lat2,lng2) {
        const R=6371000, φ1=lat1*Math.PI/180, φ2=lat2*Math.PI/180, Δφ=(lat2-lat1)*Math.PI/180, Δλ=(lng2-lng1)*Math.PI/180;
        const a=Math.sin(Δφ/2)**2+Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
        return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
    }
    
    function hitFlash() { let f=document.createElement('div'); f.className='hit-effect'; document.body.appendChild(f); setTimeout(()=>f.remove(),200); }
    
    function meleeAttack(m) {
        if(!currentLocation) return;
        let d = dist(currentLocation.lat, currentLocation.lng, m.lat, m.lng);
        if(d>15){ alert(`Далеко ${Math.floor(d)}м`); return; }
        m.hp -= 25;
        if(m.hp<=0) killMonster(m);
        hitFlash();
    }
    
    function fireAttack(m) {
        if(player.mana<30){ alert('Нет маны'); return; }
        if(!currentLocation) return;
        let d = dist(currentLocation.lat, currentLocation.lng, m.lat, m.lng);
        if(d>FIRE_RANGE){ alert(`Далеко ${Math.floor(d)}м`); return; }
        player.mana -= 30; m.hp -= 45; updateUI();
        if(m.hp<=0) killMonster(m);
        hitFlash();
        setTimeout(()=>{ if(player.mana<player.maxMana){ player.mana=Math.min(player.maxMana,player.mana+5); updateUI(); }},1000);
    }
    
    function killMonster(m) {
        let gainXp=20+Math.floor(Math.random()*10), gainGold=8+Math.floor(Math.random()*12);
        player.xp+=gainXp; player.gold+=gainGold;
        let need=player.lvl*100;
        if(player.xp>=need){
            player.lvl++; player.xp-=need; player.maxHp+=15; player.hp=player.maxHp; player.maxMana+=10; player.mana=player.maxMana;
        }
        updateUI();
        removeMonster(m.id);
        if(Math.random()<0.3) addInteractive(m.lat,m.lng,Math.random()<0.7?'barrel':'chest');
    }
    
    // Иконки
    function playerIcon() { return L.divIcon({html:`<div style="background:#2c6e2c; width:30px; height:30px; border-radius:50%; border:2px solid gold; display:flex; align-items:center; justify-content:center; font-size:18px;">🧙</div>`, iconSize:[30,30]}); }
    function monsterIcon(t){ let e='🧟'; if(t==='skeleton_melee') e='💀'; return L.divIcon({html:`<div style="background:#3a1a1a; width:28px; height:28px; border-radius:50%; border:1px solid red; display:flex; align-items:center; justify-content:center; font-size:16px;">${e}</div>`, iconSize:[28,28]}); }
    function interIcon(t){ let e='📦'; if(t==='barrel') e='🪣'; return L.divIcon({html:`<div style="background:#2a2a1a; width:24px; height:24px; border-radius:20%; border:1px solid gold; display:flex; align-items:center; justify-content:center; font-size:14px;">${e}</div>`, iconSize:[24,24]}); }
    
    function addMonster(lat,lng,type){
        let hp=32; if(type==='skeleton_melee') hp=26;
        let id=nextId++, marker=L.marker([lat,lng],{icon:monsterIcon(type)}).addTo(map);
        monsters.push({id,lat,lng,type,hp,marker});
    }
    function removeMonster(id){
        let idx=monsters.findIndex(m=>m.id===id);
        if(idx!==-1){ if(monsters[idx].marker) map.removeLayer(monsters[idx].marker); monsters.splice(idx,1); }
    }
    function addInteractive(lat,lng,type){
        let id=nextId++, gold=5+Math.floor(Math.random()*10), mana=0;
        if(type==='chest'){ gold=20+Math.floor(Math.random()*30); mana=10; }
        let marker=L.marker([lat,lng],{icon:interIcon(type)}).addTo(map);
        interactives.push({id,lat,lng,type,gold,mana,marker});
    }
    function collectObj(obj){
        player.gold+=obj.gold; player.mana=Math.min(player.maxMana, player.mana+obj.mana);
        player.res++; updateUI();
        if(obj.marker) map.removeLayer(obj.marker);
        let idx=interactives.findIndex(i=>i.id===obj.id); if(idx!==-1) interactives.splice(idx,1);
    }
    function spawnMonsterNear(lat,lng){
        if(monsters.length>=MAX_MONSTERS) return;
        let ang=Math.random()*2*Math.PI, d=MIN_DIST+Math.random()*SPAWN_RADIUS, dLat=(d*Math.cos(ang))/111320, dLng=(d*Math.sin(ang))/(111320*Math.cos(lat*Math.PI/180));
        let newLat=lat+dLat, newLng=lng+dLng;
        newLat=Math.min(90,Math.max(-90,newLat)); newLng=Math.min(180,Math.max(-180,newLng));
        let type=Math.random()<0.3?'skeleton_melee':'zombie';
        addMonster(newLat,newLng,type);
    }
    
    // Карта
    function initMap(){
        map = L.map('map').setView([55.751244, 37.618423], 16);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OSM',subdomains:'abcd',maxZoom:19}).addTo(map);
        map.on('click', e => {
            let lat=e.latlng.lat, lng=e.latlng.lng, closest=null, minD=20;
            for(let m of monsters){ let d=dist(lat,lng,m.lat,m.lng); if(d<minD){ minD=d; closest=m; } }
            if(closest){ if(activeMode==='melee') meleeAttack(closest); else fireAttack(closest); return; }
            for(let obj of interactives) if(dist(lat,lng,obj.lat,obj.lng)<15) collectObj(obj);
        });
    }
    function centerOnPlayer(){ if(currentLocation) map.setView([currentLocation.lat, currentLocation.lng], 16); }
    
    // GPS
    function updatePlayer(lat,lng){
        if(playerMarker) map.removeLayer(playerMarker);
        playerMarker = L.marker([lat,lng],{icon:playerIcon()}).addTo(map);
        document.getElementById('gpsStatus').innerHTML = '🛰️ Активен';
        centerOnPlayer();
    }
    function onLocation(pos){
        let {latitude:lat, longitude:lng} = pos.coords;
        currentLocation = {lat,lng};
        updatePlayer(lat,lng);
        if(monsters.length<2) for(let i=0;i<2;i++) spawnMonsterNear(lat,lng);
        if(interactives.length<2 && Math.random()<0.1) addInteractive(lat+(Math.random()-0.5)*0.001, lng+(Math.random()-0.5)*0.001, 'barrel');
    }
    function startGPS(){
        if(!navigator.geolocation){ document.getElementById('gpsStatus').innerHTML='❌ Нет GPS'; return; }
        navigator.geolocation.getCurrentPosition(
            (pos)=>{ if(watchId) navigator.geolocation.clearWatch(watchId); watchId=navigator.geolocation.watchPosition(onLocation, ()=>document.getElementById('gpsStatus').innerHTML='❌ Ошибка', {enableHighAccuracy:true, maximumAge:0, timeout:10000}); onLocation(pos); },
            ()=>document.getElementById('gpsStatus').innerHTML='❌ Запрещён',
            {enableHighAccuracy:true, timeout:10000}
        );
    }
    
    // Запуск
    window.onload = ()=>{
        initMap();
        startGPS();
        document.getElementById('meleeBtn').onclick = ()=>setMode('melee');
        document.getElementById('fireBtn').onclick = ()=>setMode('fire');
        setMode('melee');
        updateUI();
        setTimeout(()=>{
            if(currentLocation) for(let i=0;i<2;i++) spawnMonsterNear(currentLocation.lat, currentLocation.lng);
            else { addMonster(55.751244,37.618423,'zombie'); addMonster(55.7515,37.6188,'skeleton_melee'); }
        },2000);
        setInterval(()=>{
            if(player.mana<player.maxMana){ player.mana=Math.min(player.maxMana, player.mana+2); updateUI(); }
            if(player.hp<player.maxHp && monsters.filter(m=>dist(currentLocation?.lat,currentLocation?.lng,m.lat,m.lng)<25).length===0){
                player.hp=Math.min(player.maxHp, player.hp+1); updateUI();
            }
        },3000);
    };
</script>
</body>
</html>
